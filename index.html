<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b3d5c">
<link rel="manifest" href="manifest.json">
<title>TOEFL 2026 訓練系統</title>
<style>
  :root{--bg:#0b1220;--card:#131c2e;--card2:#0f1726;--line:#243149;--txt:#e6edf6;--mut:#8aa0bd;--acc:#3da9fc;--good:#37d399;--warn:#f6c453;--bad:#f87272}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"PingFang TC","Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--txt);-webkit-text-size-adjust:100%}
  header{padding:14px 16px;background:linear-gradient(135deg,#0b3d5c,#0b1220);position:sticky;top:0;z-index:10;border-bottom:1px solid var(--line)}
  header h1{margin:0;font-size:17px;letter-spacing:.5px}
  header .sub{color:var(--mut);font-size:12px;margin-top:2px}
  main{padding:14px;max-width:820px;margin:0 auto;padding-bottom:92px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin:12px 0}
  .card h2{margin:0 0 10px;font-size:15px}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .scoregrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;text-align:center}
  .scoregrid .s{background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:10px 4px}
  .scoregrid .s b{display:block;font-size:22px;margin-top:2px}
  .scoregrid .s small{color:var(--mut);font-size:11px}
  .big{font-size:30px;font-weight:700}
  .pill{display:inline-block;padding:3px 9px;border-radius:99px;font-size:12px;border:1px solid var(--line)}
  .pill.ok{color:var(--good);border-color:#1c5e46}.pill.gap{color:var(--warn);border-color:#5e4d1c}
  .pill.c2{color:#d6a2ff;border-color:#5a3a7a}.pill.c1{color:var(--acc);border-color:#1c3a52}
  button{font:inherit;cursor:pointer;border-radius:10px;border:1px solid var(--line);background:var(--card2);color:var(--txt);padding:9px 13px}
  button.acc{background:var(--acc);border-color:var(--acc);color:#06223a;font-weight:600}
  button.ghost{background:transparent}button:active{transform:translateY(1px)}
  button:disabled{opacity:.5}
  .opt{display:block;width:100%;text-align:left;margin:6px 0;padding:11px 13px}
  .opt.sel{border-color:var(--acc);background:#11283d}
  .opt.right{border-color:var(--good);background:#10301f}.opt.wrong{border-color:var(--bad);background:#311414}
  label.chk{display:flex;gap:9px;align-items:flex-start;margin:7px 0;font-size:14px;cursor:pointer}
  textarea,input[type=text]{width:100%;background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:10px;font:inherit}
  select{background:var(--card2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:7px}
  .mut{color:var(--mut)}.small{font-size:12px}.bad{color:var(--bad)}.good{color:var(--good)}
  .passage{background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:12px;line-height:1.65;font-size:14px;max-height:44vh;overflow:auto}
  .tag{font-size:11px;color:var(--acc);border:1px solid #1c3a52;border-radius:6px;padding:1px 6px}
  nav{position:fixed;bottom:0;left:0;right:0;background:#0c1424;border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:6px 2px env(safe-area-inset-bottom)}
  nav button{border:none;background:none;color:var(--mut);font-size:11px;padding:6px 4px;border-radius:8px;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:50px}
  nav button.active{color:var(--acc)}nav .ico{font-size:18px;line-height:1}
  .bar{height:8px;background:var(--card2);border-radius:99px;overflow:hidden;border:1px solid var(--line)}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--acc),var(--good))}
  .timer{font-variant-numeric:tabular-nums;font-weight:700}
  .flex-between{display:flex;justify-content:space-between;align-items:center;gap:8px}
  ul.task{list-style:none;padding:0;margin:0}
  ul.task li{display:flex;gap:9px;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)}
  ul.task li:last-child{border:none}
  .dot{width:9px;height:9px;border-radius:99px;background:var(--mut);flex:none}
  .done .dot{background:var(--good)}.done span{color:var(--mut);text-decoration:line-through}
  audio{width:100%;margin-top:8px}
  a{color:var(--acc)}
  .reslink{display:block;background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:11px;margin:7px 0;text-decoration:none;color:var(--txt)}
  .reslink b{color:var(--acc)}
</style>
</head>

<script>window.__EMBED__={"reading":[{"id":"C-words-001","section":"reading","taskType":"complete-words","format":"2026","topic":"Complete the Words — The Origins of Writing","targetCEFR":"B2","author":"self-authored, original; 'Complete the Words' task type","instruction":"Fill in the missing letters to complete each word.","parts":["We ",{"p":"kn","a":"ow"}," from cave paintings that ",{"p":"anc","a":"ient"}," peoples ",{"p":"rec","a":"orded"}," the animals they hunted. Long ",{"p":"bef","a":"ore"}," the ",{"p":"alph","a":"abet"},", these ",{"p":"im","a":"ages"}," allowed ",{"p":"knowl","a":"edge"}," to be shared across ",{"p":"gener","a":"ations"},". Writing itself developed ",{"p":"grad","a":"ually"},", beginning with simple marks pressed into ",{"p":"cl","a":"ay"},"."]},{"id":"D-email-001","section":"reading","taskType":"daily-life","format":"2026","topic":"Daily Life — Gym Email (Pool Closure)","targetCEFR":"B2","author":"self-authored, original; 'Read in Daily Life' task type","passage":"To: all-members@harbourgym.com\nFrom: reception@harbourgym.com\nSubject: Temporary Pool Closure\n\nHi everyone,\n\nPlease note that our swimming pool will be closed from Monday, July 6 to Friday, July 10 for its annual deep-clean and tile repair. All other facilities — the gym floor, studios, and sauna — will stay open as usual.\n\nIf you booked a swimming class during that week, it has been automatically moved to the following week, and you will get a reminder by text. Members who only use the pool can freeze their membership for those days at no charge; just reply to this email before July 4.\n\nThanks for your patience,\nHarbour Gym Team","questions":[{"id":"q1","type":"gist-purpose","construct":"信件目的","cefr":"B1-B2","stem":"Why was this email sent?","options":["To advertise a new pool","To tell members the pool will be closed for cleaning and repair","To raise membership prices","To cancel all gym classes"],"answer":1,"rationale":"主旨與內文：泳池將因年度深層清潔與磁磚維修而關閉。","distractorRationale":["A 非宣傳新池","C 未提漲價","D 只關泳池，其他照常"]},{"id":"q2","type":"detail","construct":"細節","cefr":"B2","stem":"Which facilities will stay open during that week?","options":["Only the pool","The gym floor, studios, and sauna","Nothing — the whole gym closes","Only the sauna"],"answer":1,"rationale":"『All other facilities — the gym floor, studios, and sauna — will stay open』。","distractorRationale":["A 泳池正是要關的","C 與『其他照常』相反","D 不只三溫暖"]},{"id":"q3","type":"detail","construct":"細節","cefr":"B2","stem":"What will happen to a swimming class booked during that week?","options":["It will be cancelled","It will be moved to the following week","It will be held outdoors","It will cost extra"],"answer":1,"rationale":"『automatically moved to the following week』。","distractorRationale":["A 非取消","C 無戶外之說","D 無額外費用"]},{"id":"q4","type":"inference","construct":"推論行動","cefr":"B2","stem":"What can a member who only uses the pool do, and by when?","options":["Freeze their membership for free by replying before July 4","Get a full refund after July 10","Use another gym for free","Nothing can be done"],"answer":0,"rationale":"只用泳池者可免費凍結會籍，需在 7/4 前回信。","distractorRationale":["B 無退費之說","C 無他館之說","D 與『可凍結』相反"]},{"id":"q5","type":"vocabulary","construct":"情境詞義","cefr":"B2","stem":"In the email, \"freeze their membership\" most nearly means","options":["cancel it permanently","pause it temporarily","upgrade it","share it with a friend"],"answer":1,"rationale":"freeze membership＝暫停會籍（那幾天）。","distractorRationale":["A 是暫停非永久取消","C 與升級無關","D 與分享無關"]}]},{"id":"R-bluesky-008","section":"reading","format":"2026-adaptive","topic":"Physical Science — Why the Sky Is Blue","targetCEFR":"C1","author":"self-authored, original; format calibrated to official 2026 spec","passage":"Sunlight appears white, but it is in fact a mixture of all the colours of the rainbow, each corresponding to a distinct wavelength. As this radiation enters the atmosphere, it encounters molecules of gas considerably smaller than the wavelengths themselves. These exceptionally minute particles scatter the incoming light in every direction, yet they do not scatter each colour to an equal degree.\n\nThe decisive factor is wavelength. Shorter wavelengths, at the blue and violet end of the spectrum, are scattered far more strongly than the longer red and orange ones. Consequently, blue light is distributed across the entire sky, reaching our eyes from every direction. This is why, on a clear day, the sky appears blue rather than the white of the original sunlight.\n\nThe same principle accounts for the colours of sunset. When the Sun is low, its light must travel through much more atmosphere to reach us. Along this extended path, the majority of the blue light has already been scattered away before it arrives, leaving the reds and oranges that characteristically dominate the evening sky. The colour we perceive, then, depends not on the light itself but on how the atmosphere filters it.","insertSentence":"Our eyes, in other words, are catching light that has bounced off countless molecules overhead.","questions":[{"id":"q1","type":"factual-information","construct":"定位明示事實","cefr":"B2-C1","stem":"According to the passage, what is white sunlight actually made of?","options":["A single pure colour","A mixture of all the colours, each with a different wavelength","Only blue and red light","Gas molecules from the atmosphere"],"answer":1,"rationale":"段1：白光其實是各色（各波長）的混合。","distractorRationale":["A 與『混合』相反","C 是不完整的細節","D 混淆光與分子"]},{"id":"q2","type":"vocabulary","construct":"情境詞義","cefr":"C1","stem":"In paragraph 1, \"scatter\" is closest in meaning to","options":["absorb completely","spread in many directions","speed up","darken"],"answer":1,"rationale":"scatter＝向四面八方散射。","distractorRationale":["A 與『散射出去』相反（非吸收）","C 與方向無關","D 與顏色變暗無關"]},{"id":"q3","type":"inference","construct":"推論機制","cefr":"C1","stem":"Why does the daytime sky appear blue rather than the original white of sunlight? It can be inferred that","options":["the atmosphere removes every colour except blue from sunlight","blue light is scattered across the whole sky and reaches our eyes from every direction","sunlight does not actually contain violet or red light","the Sun emits more blue light than any other colour"],"answer":1,"rationale":"段2：短波藍光被強烈散射、佈滿全天、從各方向入眼，故天空呈藍而非原本的白。","distractorRationale":["並非『只留藍』；那是散射不是移除，且移除藍光是日落長路徑才發生","","白光含所有顏色（段1）","成因是散射，非太陽多發藍光；白光為各色混合"]},{"id":"q4","type":"sentence-simplification","construct":"保留核心意義改寫","cefr":"C1","highlight":"When the Sun is low, its light must travel through much more atmosphere to reach us.","stem":"Which best expresses the essential information in the highlighted sentence? Incorrect choices change the meaning or leave out essential information.","options":["A low Sun's light passes through far more air before reaching us.","The Sun gives off less light when it is low in the sky.","Sunlight reaches us faster when the Sun is low.","A low Sun is closer to the Earth."],"answer":0,"rationale":"核心＝太陽低時，光要穿過更多大氣才到我們。","distractorRationale":["B 偷換成『光變少』","C 與『更多路徑』相反（非更快）","D 捏造距離變化"]},{"id":"q5","type":"insert-text","construct":"句子邏輯銜接","cefr":"C1","stem":"Look at the squares [A], [B], [C], [D]. Where does this sentence best fit: \"Our eyes, in other words, are catching light that has bounced off countless molecules overhead.\"","positions":{"A":"在段1結尾","B":"在段2『...reaching our eyes from every direction.』之後（剛說藍光從各方向入眼）","C":"在段3『...much more atmosphere to reach us.』之後","D":"在段3結尾"},"answer":"B","rationale":"此句是對『藍光從各方向散射入眼』的同義重述（in other words），最適接在該描述之後。","distractorRationale":["A 此處尚未講到入眼機制","C 已轉談日落較長路徑","D 結尾在談過濾，重述位置偏晚"]},{"id":"q6","type":"prose-summary","construct":"辨主旨、排除細節曲解","cefr":"C1","multiSelect":true,"intro":"The colour of the sky comes from how the atmosphere scatters sunlight.","stem":"Choose the TWO statements that express the most important ideas in the passage.","options":["Because shorter blue wavelengths scatter most, blue light fills the daytime sky.","At sunset, light travels through more atmosphere, so blue is scattered away and reds and oranges remain.","Sunlight contains seven named colours.","Violet has a longer wavelength than red.","Gas molecules are larger than the wavelengths of light."],"answer":[0,1],"rationale":"A=白天藍天機制（段1-2）；B=日落紅橙機制（段3）。為全文骨幹。","distractorRationale":["C 細節且不準（非重點）","D 事實錯誤（紫波長較短）","E 與文中『分子遠小於波長』相反"]}]},{"id":"R-commons-003","section":"reading","format":"2026-adaptive","topic":"Social Science / Economics — The Tragedy of the Commons","targetCEFR":"C2","author":"self-authored, original; format calibrated to official 2026 spec; ceiling-difficulty item","passage":"In an influential 1968 essay, the ecologist Garrett Hardin described a dilemma he called the tragedy of the commons. Imagine a pasture open to all herders. Each individual, acting rationally in pursuit of personal gain, has an incentive to graze as many animals as possible, since the benefit of an additional animal accrues to that herder alone, whereas the cost of overgrazing is distributed across the entire community. Multiplied across many users, this logic drives the shared resource toward exhaustion, even though no single participant actually desires that outcome.\n\nHardin's parable was long invoked to justify either strict government regulation or outright privatization as the only remedies for collective overuse. Subsequent research, however, complicated this conclusion. The political scientist Elinor Ostrom demonstrated that communities around the world have, for centuries, devised their own institutions to govern shared resources sustainably, without recourse to either the state or the market. Through binding local rules, mutual monitoring, and graduated sanctions, such arrangements can align individual incentives with the collective interest.\n\nThe commons, on this account, is not inevitably doomed. Its fate depends far less on the abstract structure of the dilemma than on whether those who depend on the resource can construct credible mechanisms to constrain one another.","insertSentence":"Self-interest, in other words, can quietly destroy a resource that everyone needs.","questions":[{"id":"q1","type":"factual-information","construct":"定位明示事實","cefr":"C1-C2","stem":"According to Hardin, why does each herder have an incentive to add more animals?","options":["The community rewards herders with the largest herds.","The full benefit goes to the herder, while the cost of overgrazing is shared by all.","Animals reproduce faster on a crowded pasture.","Government rules require maximum use of the land."],"answer":1,"rationale":"段1：增加一隻的利益歸個人，過度放牧的成本由全體分攤。","distractorRationale":["A 文中無『獎勵最大群』之說","C 與繁殖速度無關，捏造","D 與『rationally自利』機制無關"]},{"id":"q2","type":"vocabulary","construct":"情境詞義","cefr":"C2","stem":"In paragraph 1, \"exhaustion\" is closest in meaning to","options":["physical tiredness","complete depletion","rapid expansion","careful protection"],"answer":1,"rationale":"此處 exhaustion 指資源被耗盡（depletion），非『疲累』。","distractorRationale":["A 字面陷阱（人累）","C 與『耗盡』相反","D 與情境相反"]},{"id":"q3","type":"inference","construct":"推論未明說內容","cefr":"C2","stem":"What can be inferred from Ostrom's findings as described in the passage?","options":["Only governments can manage shared resources successfully.","Communities can sometimes prevent overuse without relying on the state or markets.","Privatization always destroys common resources.","Hardin's dilemma never occurs in the real world."],"answer":1,"rationale":"Ostrom 顯示社群可用自訂制度永續治理，無需國家或市場→自我治理有時可行。","distractorRationale":["A 與 Ostrom 結論相反","C 過度絕對化","D 曲解，Hardin 機制仍真實存在"]},{"id":"q4","type":"sentence-simplification","construct":"保留核心意義改寫","cefr":"C2","highlight":"Each individual ... has an incentive to graze as many animals as possible, since the benefit of an additional animal accrues to that herder alone, whereas the cost of overgrazing is distributed across the entire community.","stem":"Which best expresses the essential information in the highlighted sentence? Incorrect choices change the meaning or leave out essential information.","options":["Herders add animals because they keep all the gain but share the cost with everyone.","Herders add animals only when the community orders them to.","Herders avoid adding animals because overgrazing is too costly for them.","Herders share both the benefits and the costs of each extra animal equally."],"answer":0,"rationale":"核心＝利益獨享、成本共擔，故有過度放牧誘因。","distractorRationale":["B 竄改成被命令","C 與『有誘因增加』相反","D 把『成本共擔利益獨享』錯成兩者皆均分"]},{"id":"q5","type":"insert-text","construct":"句子邏輯銜接","cefr":"C2","stem":"Look at the squares [A], [B], [C], [D]. Where does this sentence best fit: \"Self-interest, in other words, can quietly destroy a resource that everyone needs.\"","positions":{"A":"在『...the tragedy of the commons.』之後（尚未說明機制）","B":"在『...even though no single participant actually desires that outcome.』之後（剛描述完自利導致耗竭）","C":"在『...complicated this conclusion.』之後","D":"在『...constrain one another.』之後（全文結尾）"},"answer":"B","rationale":"此句是對『自利→耗竭』的總結重述（in other words），最適放在該機制剛說明完之後。","distractorRationale":["A 機制尚未鋪陳，無可『in other words』","C 該處正轉向 Ostrom 的反例，插入打斷","D 結尾已轉為解方，語意不接"]},{"id":"q6","type":"prose-summary","construct":"辨主旨、排除細節曲解","cefr":"C2","multiSelect":true,"intro":"The 'tragedy of the commons' describes how shared resources can be overused — but that outcome may not be inevitable.","stem":"Choose the TWO statements that express the most important ideas in the passage.","options":["When individuals keep the gains but share the costs, self-interest can drive a shared resource to ruin.","Ostrom showed that communities can devise their own institutions to govern commons sustainably, so collapse is not inevitable.","Hardin published his essay in 1968.","Pastures are the most common type of shared resource in the world.","Government regulation is always more effective than privatization."],"answer":[0,1],"rationale":"A=Hardin 機制（段1）；B=Ostrom 反例與結論（段2-3）。兩者構成全文論證主軸。","distractorRationale":["C 年份屬細節非主旨","D 文中未宣稱、捏造","E 文中未比較兩者優劣，曲解"]}]},{"id":"R-geyser-004","section":"reading","format":"2026-adaptive","topic":"Earth Science — How Geysers Erupt","targetCEFR":"C1","author":"self-authored, original; format calibrated to official 2026 spec","passage":"A geyser is a rare type of hot spring that erupts intermittently, ejecting a column of water and steam into the air. For one to develop, three conditions must coincide: a steady supply of groundwater, an intense subterranean heat source, and an unusual structure of narrow, twisting channels in the surrounding rock. Where these occur together — most famously in Iceland, New Zealand, and Yellowstone — eruptions can repeat for thousands of years.\n\nThe mechanism depends on pressure. Water percolates deep underground and accumulates near hot volcanic rock. Because the overlying column of water exerts enormous pressure on it, the deepest water can be heated far beyond its normal boiling point without turning to steam. Eventually a portion of it does boil, and the rising bubbles displace some water at the surface. This release reduces the pressure below, which instantly lowers the boiling point, so a large volume of superheated water flashes into steam at once. The expanding steam drives the dramatic eruption.\n\nAfter the chamber empties, groundwater gradually replenishes it and the heating process resumes. The remarkable regularity of certain geysers reflects how consistently this cycle of accumulation, heating, and sudden release recurs.","insertSentence":"This is why geysers, unlike ordinary hot springs, erupt rather than simply flow.","questions":[{"id":"q1","type":"factual-information","construct":"定位明示事實","cefr":"B2-C1","stem":"According to the passage, which three conditions must occur together for a geyser to form?","options":["Groundwater, underground heat, and narrow twisting channels","Volcanic ash, rainfall, and flat rock layers","Steam, seawater, and deep ocean trenches","Cold water, sunlight, and loose soil"],"answer":0,"rationale":"段1明列三條件：groundwater、intense underground heat、narrow twisting channels。","distractorRationale":["B 三者皆非文中條件","C 海水/海溝無關","D 與高熱機制矛盾"]},{"id":"q2","type":"vocabulary","construct":"情境詞義","cefr":"C1","stem":"In paragraph 1, \"coincide\" is closest in meaning to","options":["occur together","disappear quickly","compete","cool down"],"answer":0,"rationale":"coincide＝同時發生/共存。","distractorRationale":["B 與『同時存在』無關","C 偷換成競爭","D 與條件並存無關"]},{"id":"q3","type":"inference","construct":"推論機制","cefr":"C1","stem":"Why can the deepest water be heated beyond its normal boiling point without boiling?","options":["Because volcanic rock cools it from below","Because the weight of the water above raises the pressure on it","Because steam insulates it from the heat","Because the channels are too narrow for bubbles"],"answer":1,"rationale":"段2：上方水柱壓下→高壓提高沸點，故可超過常壓沸點而不沸騰。","distractorRationale":["A 火山岩是加熱源非冷卻","C 蒸氣此時尚未形成","D 與沸點機制無關"]},{"id":"q4","type":"sentence-simplification","construct":"保留核心意義改寫","cefr":"C1","highlight":"This release reduces the pressure below, which instantly lowers the boiling point, so a large volume of superheated water flashes into steam at once.","stem":"Which best expresses the essential information in the highlighted sentence? Incorrect choices change the meaning or leave out essential information.","options":["Releasing some water drops the pressure, lowers the boiling point, and makes much hot water turn to steam suddenly.","Adding water raises the pressure and prevents steam from forming.","The boiling point rises slowly as steam escapes over many hours.","Only a small amount of water ever becomes steam."],"answer":0,"rationale":"核心＝釋壓→沸點驟降→大量過熱水瞬間汽化。","distractorRationale":["B 方向相反（是減壓非加壓）","C 與『instantly/at once』相反","D 與『large volume』相反"]},{"id":"q5","type":"insert-text","construct":"句子邏輯銜接","cefr":"C1","stem":"Look at the squares [A], [B], [C], [D]. Where does this sentence best fit: \"This is why geysers, unlike ordinary hot springs, erupt rather than simply flow.\"","positions":{"A":"在段1『...repeat for thousands of years.』之後","B":"在段2『...The expanding steam drives the dramatic eruption.』之後（剛解釋完爆發機制）","C":"在段2開頭『The mechanism depends on pressure.』之後","D":"在段3結尾"},"answer":"B","rationale":"此句總結『為何會爆發而非流出』，需緊接在爆發機制說明完之後（段2末）。","distractorRationale":["A 機制尚未說明，無法對比『噴發 vs 流出』","C 機制才剛起頭","D 已進入循環收尾，語意斷裂"]},{"id":"q6","type":"prose-summary","construct":"辨主旨、排除細節曲解","cefr":"C1","multiSelect":true,"intro":"A geyser is a hot spring that erupts in a repeating cycle.","stem":"Choose the TWO statements that express the most important ideas in the passage.","options":["A geyser needs groundwater, strong underground heat, and a special system of narrow channels.","Pressure lets deep water superheat; a small release then triggers a sudden flash to steam that drives the eruption.","Geysers are found in Iceland, New Zealand, and Yellowstone.","Hot springs are more common than geysers worldwide.","Steam is lighter than liquid water."],"answer":[0,1],"rationale":"A=形成條件（段1）；B=爆發機制（段2）。兩者為全文骨幹。","distractorRationale":["C 地點屬細節非主旨","D 文中未比較數量","E 雖屬常識但非本文重點"]}]},{"id":"R-neptune-002","section":"reading","format":"2026-adaptive","topic":"Astronomy / History of Science — The Discovery of Neptune","targetCEFR":"C1","author":"self-authored, original; format calibrated to official 2026 spec","passage":"For most of the eighteenth century, astronomers were satisfied that the planet Uranus moved exactly as Newton's laws predicted. By the 1840s, however, careful observation revealed an anomaly in the data: Uranus consistently drifted from its calculated path, as though some unseen force were tugging at it. Rather than abandon Newton's theory, two mathematicians independently proposed a bold explanation. They suggested that an additional, undiscovered planet lay beyond Uranus, and that its gravity was responsible for the discrepancy.\n\nWorking separately, Urbain Le Verrier in France and John Couch Adams in England computed where such a planet would have to be. In 1846 Le Verrier sent his prediction to an observatory in Berlin. On the very night they received it, astronomers there pointed their telescope at the indicated position and found the new planet, later named Neptune, within a single degree of the predicted spot.\n\nThe discovery was widely celebrated as a triumph of theory over mere observation. A planet had been found not by chance, but by calculation. To many scientists of the period, it confirmed that the universe was governed by laws precise enough to reveal what no eye had yet seen.","insertSentence":"Each arrived at almost the same answer.","questions":[{"id":"q1","type":"factual-information","construct":"定位明示事實","cefr":"B2-C1","stem":"According to the passage, what problem did astronomers notice about Uranus by the 1840s?","options":["It had begun to slow down and stop.","It strayed from the path Newton's laws predicted.","It grew steadily brighter each year.","It moved closer to the Sun than expected."],"answer":1,"rationale":"段1：『Uranus consistently drifted from its calculated path』。","distractorRationale":["A 文中無『停下』之說","C 亮度未提及","D 偏離路徑≠靠近太陽，無依據"]},{"id":"q2","type":"vocabulary","construct":"情境詞義","cefr":"C1","stem":"In paragraph 1, \"discrepancy\" is closest in meaning to","options":["a sudden collision","a difference from what was expected","a loss of brightness","a long delay"],"answer":1,"rationale":"discrepancy＝預測與觀測之間的差異。","distractorRationale":["A 偷換成碰撞","C 與亮度無關","D 偷換成時間延遲"]},{"id":"q3","type":"inference","construct":"推論未明說內容","cefr":"C1","stem":"What can be inferred about the effect of the discovery on Newton's theory?","options":["It cast serious doubt on the theory.","It strengthened confidence in the theory's predictive power.","It showed the theory applied only to Uranus.","It proved the theory needed no observation at all."],"answer":1,"rationale":"用牛頓理論預測竟能找到新行星→『triumph of theory』，強化對其預測力的信心。","distractorRationale":["A 與『triumph』相反","C 過度限縮，文意是普遍定律","D 極端化，發現仍靠望遠鏡觀測證實"]},{"id":"q4","type":"sentence-simplification","construct":"保留核心意義改寫","cefr":"C1","highlight":"Rather than abandon Newton's theory, two mathematicians independently proposed a bold explanation.","stem":"Which best expresses the essential information in the highlighted sentence? Incorrect choices change the meaning or leave out essential information.","options":["Two mathematicians rejected Newton's theory and offered a new one.","Instead of giving up Newton's theory, two mathematicians each suggested a daring idea.","Two mathematicians agreed that Newton's theory could not be saved.","Newton himself proposed a bold new explanation."],"answer":1,"rationale":"保留『不放棄牛頓理論＋各自提出大膽解釋』。","distractorRationale":["A 與『rather than abandon』相反","C 同樣竄改成放棄理論","D 張冠李戴成牛頓本人"]},{"id":"q5","type":"insert-text","construct":"句子邏輯銜接","cefr":"C1","stem":"Look at the squares [A], [B], [C], [D]. Where does this sentence best fit: \"Each arrived at almost the same answer.\"","positions":{"A":"在『...moved exactly as Newton's laws predicted.』之後","B":"在『...two mathematicians independently proposed a bold explanation.』之後","C":"在『...computed where such a planet would have to be.』之後（剛說兩人各自算出位置）","D":"在『...within a single degree of the predicted spot.』之後"},"answer":"C","rationale":"『Each arrived at almost the same answer』需緊接在『兩人各自計算位置』之後，呼應 independently＋彼此結果一致，自然引出後文寄出預測。","distractorRationale":["A 此處尚無『兩人各自計算』可指","B 只說提出解釋、還沒算出答案","D 已是發現之後，時序錯置"]},{"id":"q6","type":"prose-summary","construct":"辨主旨、排除細節曲解","cefr":"C1","multiSelect":true,"intro":"In the 1840s, the unexpected motion of Uranus led to a remarkable astronomical discovery.","stem":"Choose the TWO statements that express the most important ideas in the passage.","options":["Uranus's deviation led mathematicians to use Newton's laws to predict an unknown planet.","Neptune was found very close to the predicted position and hailed as a victory for theory.","Le Verrier worked in France while Adams worked in England.","The Berlin observatory had the largest telescope in Europe.","Newton personally discovered the planet Neptune."],"answer":[0,1],"rationale":"A=問題與預測（段1+2上）；B=發現與意義（段2下+段3）。涵蓋全文骨幹。","distractorRationale":["C 屬支微細節非主旨","D 文中未提、捏造","E 事實錯誤"]}]},{"id":"R-perspective-005","section":"reading","format":"2026-adaptive","topic":"Art History — Linear Perspective in the Renaissance","targetCEFR":"C1","author":"self-authored, original; format calibrated to official 2026 spec","passage":"Before the fifteenth century, European painters rarely created a convincing sense of depth. Figures were often arranged by importance rather than by distance, and the space behind them looked flat. This changed when artists in Renaissance Italy developed linear perspective, a method for representing three-dimensional space on a flat surface.\n\nThe central insight was that parallel lines receding from the viewer appear to converge at a single point on the horizon, known as the vanishing point. By drawing the edges of floors, walls, and buildings so that they met at this point, a painter could make a scene recede convincingly into the distance. Objects were also reduced in size according to fixed mathematical ratios as they moved farther away, reinforcing the illusion.\n\nThe architect Filippo Brunelleschi is usually credited with demonstrating the technique, and the painter Masaccio applied it boldly in his frescoes. Within a few decades the method had spread across Europe. Perspective did more than improve realism; it reflected a broader confidence that the visible world could be measured and described through geometry. In this sense, a painting became not only an image but also a kind of calculation.","insertSentence":"The result could be almost as convincing as looking through a window.","questions":[{"id":"q1","type":"factual-information","construct":"定位明示事實","cefr":"B2-C1","stem":"According to the passage, how were figures often arranged before the fifteenth century?","options":["According to their distance from the viewer","According to their importance rather than distance","Along the vanishing point","By strict mathematical ratios"],"answer":1,"rationale":"段1：『arranged by importance rather than by distance』。","distractorRationale":["A 正是後來才有的做法","C 消失點是後文概念","D 數學比例屬透視法之後"]},{"id":"q2","type":"vocabulary","construct":"情境詞義","cefr":"C1","stem":"In paragraph 2, \"converge\" is closest in meaning to","options":["come together at one point","spread far apart","disappear from view","change color"],"answer":0,"rationale":"平行線在地平線『會聚於一點』＝消失點。","distractorRationale":["B 與『會聚』相反","C 偷換成消失","D 與幾何無關"]},{"id":"q3","type":"inference","construct":"推論用意","cefr":"C1","stem":"Why were distant objects drawn smaller, according to the passage?","options":["To save space on the canvas","To strengthen the illusion of depth","To hide the vanishing point","Because distant objects are less important"],"answer":1,"rationale":"段2：依數學比例縮小遠物以『reinforcing the illusion』。","distractorRationale":["A 與省空間無關","C 與隱藏消失點無關","D 重要性是舊式排列，非透視原因"]},{"id":"q4","type":"sentence-simplification","construct":"保留核心意義改寫","cefr":"C1","highlight":"The central insight was that parallel lines receding from the viewer appear to converge at a single point on the horizon, known as the vanishing point.","stem":"Which best expresses the essential information in the highlighted sentence? Incorrect choices change the meaning or leave out essential information.","options":["The key idea was that parallel lines going away from the viewer seem to meet at one point on the horizon.","Parallel lines never appear to meet, even in the distance.","The horizon is always drawn at the center of a painting.","Painters discovered that lines change direction near the viewer."],"answer":0,"rationale":"核心＝遠去的平行線看似會聚於地平線上一點。","distractorRationale":["B 與『appear to converge』相反","C 與消失點意義無關、捏造規則","D 曲解成『改變方向』"]},{"id":"q5","type":"insert-text","construct":"句子邏輯銜接","cefr":"C1","stem":"Look at the squares [A], [B], [C], [D]. Where does this sentence best fit: \"The result could be almost as convincing as looking through a window.\"","positions":{"A":"在段1『...looked flat.』之後","B":"在段2『...reinforcing the illusion.』之後（剛說明完如何造出逼真深度）","C":"在段3『...spread across Europe.』之後","D":"在段3結尾"},"answer":"B","rationale":"此句評述『造出的逼真效果』，需緊接在說明完透視如何製造深度幻覺之後（段2末）。","distractorRationale":["A 此處在講舊式平面、尚無『逼真結果』可評","C 已轉談傳播史","D 已是抽象結論，語意不接"]},{"id":"q6","type":"prose-summary","construct":"辨主旨、排除細節曲解","cefr":"C1","multiSelect":true,"intro":"In the Renaissance, painters learned to represent depth on a flat surface.","stem":"Choose the TWO statements that express the most important ideas in the passage.","options":["Linear perspective used a vanishing point and shrinking sizes to make flat paintings appear deep.","Beyond improving realism, perspective expressed a new confidence that the world could be measured through geometry.","Brunelleschi was an architect.","Masaccio painted only frescoes.","Most medieval paintings were larger than Renaissance ones."],"answer":[0,1],"rationale":"A=方法（段2）；B=更深層意義（段3）。涵蓋全文。","distractorRationale":["C 屬人物細節非主旨","D 過度概化、文中未限定『只畫』","E 文中未比較尺寸，捏造"]}]},{"id":"R-printing-007","section":"reading","format":"2026-adaptive","topic":"History — The Printing Revolution","targetCEFR":"C1","author":"self-authored, original; format calibrated to official 2026 spec","passage":"Before the middle of the fifteenth century, almost every book in Europe was copied out by hand. The work was slow and expensive, and as a result written knowledge remained the privilege of a small elite. This began to change when Johannes Gutenberg introduced printing with movable metal type around 1450. Individual letters, cast in metal, could be arranged into a page, used to print hundreds of copies, and then rearranged for the next page.\n\nThe consequences were far-reaching. Because books could now be produced quickly and cheaply, their numbers multiplied and their prices fell. Ideas that had once circulated slowly among scholars could spread across the continent within months. Historians often link the printing press to the rapid expansion of the Reformation and the Scientific Revolution, both of which depended on the wide distribution of texts.\n\nNot everyone welcomed the change. Some authorities feared that uncontrolled printing would spread error and dissent, and attempts at censorship soon followed. Yet the technology proved impossible to suppress. By making knowledge reproducible on a large scale, the printing press reshaped European intellectual life more profoundly than almost any invention before it.","insertSentence":"A single setting of type could yield more books in a week than a scribe could copy in a lifetime.","questions":[{"id":"q1","type":"factual-information","construct":"定位明示事實","cefr":"B2-C1","stem":"According to the passage, how were almost all European books produced before the mid-fifteenth century?","options":["Printed with metal type","Copied out by hand","Imported from Asia","Carved into wood blocks"],"answer":1,"rationale":"段1：『almost every book in Europe was copied out by hand』。","distractorRationale":["A 是 1450 後才有","C 文中未提進口","D 未提木刻"]},{"id":"q2","type":"vocabulary","construct":"情境詞義","cefr":"C1","stem":"In paragraph 1, \"privilege\" is closest in meaning to","options":["a special advantage held by few","a difficult duty","a common habit","a legal punishment"],"answer":0,"rationale":"『privilege of a small elite』＝少數人才享有的特權/優勢。","distractorRationale":["B 偷換成義務","C 與『少數菁英』相反","D 與處罰無關"]},{"id":"q3","type":"inference","construct":"推論因果","cefr":"C1","stem":"What can be inferred about why book prices fell after movable type was introduced?","options":["Fewer people wanted to read","Books could be made quickly and in large numbers","Governments subsidized printing","Scribes lowered their fees"],"answer":1,"rationale":"段2：能快速廉價大量生產→數量增、價格落。","distractorRationale":["A 與『知識傳播擴大』相反","C 文中無補貼之說","D 與手抄被取代矛盾"]},{"id":"q4","type":"sentence-simplification","construct":"保留核心意義改寫","cefr":"C1","highlight":"Historians often link the printing press to the rapid expansion of the Reformation and the Scientific Revolution, both of which depended on the wide distribution of texts.","stem":"Which best expresses the essential information in the highlighted sentence? Incorrect choices change the meaning or leave out essential information.","options":["Historians connect the press to the spread of the Reformation and the Scientific Revolution, which both relied on texts reaching many people.","The Reformation and the Scientific Revolution caused the printing press to be invented.","Historians doubt that the printing press had any real effect on these movements.","Texts were distributed widely only after the Scientific Revolution ended."],"answer":0,"rationale":"核心＝史家把印刷術連到兩場運動的擴張，兩者都靠文本廣傳。","distractorRationale":["B 因果倒置","C 與『link to expansion』相反","D 時序與文義錯置"]},{"id":"q5","type":"insert-text","construct":"句子邏輯銜接","cefr":"C1","stem":"Look at the squares [A], [B], [C], [D]. Where does this sentence best fit: \"A single setting of type could yield more books in a week than a scribe could copy in a lifetime.\"","positions":{"A":"在段1『...rearranged for the next page.』之後（剛說明完活字如何運作）","B":"在段2『...their prices fell.』之後","C":"在段2『...within months.』之後","D":"在段3結尾"},"answer":"A","rationale":"此句具體對比『活字 vs 手抄』的產量，緊接活字運作說明之後最自然，並引出段2的後果。","distractorRationale":["B 已在講價格，產量對比位置偏晚","C 已轉談思想傳播","D 段3談審查，語意不接"]},{"id":"q6","type":"prose-summary","construct":"辨主旨、排除細節曲解","cefr":"C1","multiSelect":true,"intro":"Gutenberg's movable type transformed how knowledge spread in Europe.","stem":"Choose the TWO statements that express the most important ideas in the passage.","options":["Movable type let books be made quickly and cheaply, so knowledge spread far beyond a small elite.","Despite attempts at censorship, the press could not be suppressed and deeply reshaped intellectual life.","Gutenberg worked around the year 1450.","Most early books were about religion.","Scribes were generally faster than printing presses."],"answer":[0,1],"rationale":"A=技術與傳播效應（段1-2）；B=阻力與深遠影響（段3）。涵蓋全文。","distractorRationale":["C 年份屬細節非主旨","D 文中未宣稱、捏造","E 與全文相反"]}]},{"id":"R-myco-001","section":"reading","format":"2026-adaptive","topic":"Biology — Mycorrhizal networks","targetCEFR":"C1","author":"self-authored, original; format calibrated to official 2026 spec","passage":"Beneath the floor of many forests lies a hidden web of fungal threads that links the roots of separate trees. These fungi, known as mycorrhizae, attach themselves to roots and reach far into the soil, absorbing water and mineral nutrients that they pass to their host. In return, the tree supplies the fungi with sugars produced through photosynthesis. The relationship is therefore mutually beneficial, and few trees in temperate forests grow well without it.\n\nRecent research suggests that the network does more than feed individual trees. Because a single fungus may connect dozens of plants, resources can flow from one tree to another along the fungal bridges. Older, well-established trees sometimes transfer carbon to shaded seedlings that cannot yet produce enough of their own, enhancing the younger plants' chances of survival.\n\nCritics caution, however, that the scale of such transfers in natural forests remains uncertain. Much of the supporting evidence is derived from laboratory conditions, where variables are tightly controlled and may not reflect the complexity of a living woodland. Whether the so-called 'wood-wide web' significantly shapes forest dynamics, or merely operates at the margins, is still a matter of active debate.","insertSentence":"This exchange is the basis of their partnership.","questions":[{"id":"q1","type":"factual-information","construct":"在文中定位明示的事實","cefr":"B2-C1","stem":"According to the passage, what do mycorrhizal fungi obtain from their host tree?","options":["Water drawn from deep in the soil","Sugars produced by photosynthesis","Mineral nutrients released by decaying matter","Protection from competing fungi"],"answer":1,"rationale":"段1明寫『the tree supplies the fungi with sugars produced through photosynthesis』。","distractorRationale":["A 是真菌『給』樹的（方向相反）","C 也是真菌提供給樹的養分（方向相反）","D 文中未提及，憑空想像"]},{"id":"q2","type":"vocabulary","construct":"情境中的詞義","cefr":"C1","stem":"In paragraph 1, \"mutually beneficial\" is closest in meaning to","options":["difficult to maintain","advantageous to both sides","rarely successful","useful only for a short time"],"answer":1,"rationale":"mutual=雙方，beneficial=有利；雙方互利。","distractorRationale":["A 與『互利』無關，偷換成『難維持』","C 與文義相反（文中是普遍成功的共生）","D 加入『短暫』這個文中沒有的限制"]},{"id":"q3","type":"inference","construct":"由文本推論未明說的內容","cefr":"C1","stem":"What can be inferred about the shaded seedlings mentioned in paragraph 2?","options":["They grow faster than the older trees around them.","They cannot yet meet all of their own energy needs.","They usually belong to a different species from the older trees.","They damage the fungi they are connected to."],"answer":1,"rationale":"『transfer carbon to shaded seedlings that cannot yet produce enough of their own』→ 幼苗自身能量不足，需外援。","distractorRationale":["A 與『需要被接濟』矛盾","C 文中未涉及物種異同","D 與互利前提矛盾，且無依據"]},{"id":"q4","type":"sentence-simplification","construct":"保留核心意義的改寫","cefr":"C1","highlight":"Critics caution, however, that the scale of such transfers in natural forests remains uncertain.","stem":"Which of the following best expresses the essential information in the highlighted sentence? Incorrect choices change the meaning or leave out essential information.","options":["Critics agree that large transfers occur in every natural forest.","Some experts doubt how large these transfers really are in the wild.","Critics believe such transfers never happen outside laboratories.","The scale of these transfers is easy to measure in natural forests."],"answer":1,"rationale":"保留『質疑(caution)＋規模不確定(scale remains uncertain)』兩個核心。","distractorRationale":["A 把『質疑』竄改成『同意』，且加上絕對化『every』","C 極端化成『絕不發生』，原文只說規模不確定","D 與『remains uncertain』相反"]},{"id":"q5","type":"insert-text","construct":"句子邏輯銜接位置","cefr":"C1","stem":"Look at the four squares [A], [B], [C], [D] that indicate where the following sentence could be added: \"This exchange is the basis of their partnership.\" Where does the sentence best fit?","positions":{"A":"在『...pass to their host.』之後（只講了真菌給樹，尚未講樹回給真菌）","B":"在『...sugars produced through photosynthesis.』之後（雙向交換都講完了）","C":"在『...grow well without it.』之後（段落結尾）","D":"第二段開頭"},"answer":"B","rationale":"『This exchange』需要前文同時出現『真菌→養分』與『樹→醣』兩個方向才能指涉；只有在 B（兩向都講完）後接才成立，且自然引出後句『因此關係互利』。","distractorRationale":["A 此處只講了單向，『exchange』無所指","C 已進入結論句，插入打斷『因此互利』的因果","D 第二段轉談網路傳輸，主題已換"]},{"id":"q6","type":"prose-summary","construct":"辨識主旨與要點、排除細節與曲解","cefr":"C1","multiSelect":true,"intro":"Mycorrhizal fungi form a hidden network that connects trees through their roots.","stem":"Choose the TWO statements that express the most important ideas in the passage.","options":["Fungi and trees trade soil nutrients for sugars in a relationship that benefits both.","The fungal network may move resources such as carbon between connected plants, though its real-world importance is debated.","Mycorrhizae are found only in temperate forests.","Photosynthesis takes place in the roots of trees.","Laboratory studies are always more reliable than studies done in forests."],"answer":[0,1],"rationale":"A=段1主旨（互利交換）；B=段2+段3主旨（網路傳輸＋爭議）。兩者涵蓋全文骨幹。","distractorRationale":["C 過度概化的細節，且文中未限定『只有』溫帶","D 事實錯誤（光合在葉不在根）","E 曲解，原文反而提醒實驗室≠真實林地"]}]},{"id":"R-sunkcost-006","section":"reading","format":"2026-adaptive","topic":"Behavioral Economics — The Sunk-Cost Fallacy","targetCEFR":"C2","author":"self-authored, original; format calibrated to official 2026 spec; ceiling-difficulty item","passage":"Economists generally assume that rational decision-makers consider only future costs and benefits. Money, time, or effort already spent — what they term a sunk cost — should be irrelevant, because no present decision can recover it. Yet a substantial body of research demonstrates that people routinely violate this principle, persisting with a failing course of action precisely because they have already invested heavily in it.\n\nThe pattern, known as the sunk-cost fallacy, appears across remarkably varied contexts. An individual may sit through a tedious film simply because the ticket was expensive, and governments have continued to fund unpromising projects on the grounds that abandoning them would waste the sums already committed. In each case, prior investment, which logically ought to be disregarded, instead distorts the assessment of what remains genuinely worthwhile.\n\nSeveral explanations have been proposed. Some researchers emphasize a reluctance to appear wasteful, since admitting that resources were squandered can feel like conceding incompetence. Others point to loss aversion, the well-documented tendency to weigh losses more heavily than equivalent gains. Whatever its precise origin, the fallacy illustrates a recurring theme in behavioral economics: that human judgment departs systematically from the idealized rationality that classical models presuppose.","insertSentence":"The choice that follows, in other words, is driven by the past rather than by the future.","questions":[{"id":"q1","type":"factual-information","construct":"定位明示事實","cefr":"C1-C2","stem":"According to economists, why should a sunk cost be irrelevant to a present decision?","options":["Because it is usually a small amount","Because no present decision can recover what was already spent","Because future benefits are impossible to predict","Because governments rarely track such costs"],"answer":1,"rationale":"段1：已花費的無法被當下決策收回，故應無關。","distractorRationale":["A 與金額大小無關","C 偷換成『未來不可預測』","D 與政府追蹤無關"]},{"id":"q2","type":"vocabulary","construct":"情境詞義","cefr":"C2","stem":"In paragraph 3, \"squandered\" is closest in meaning to","options":["wasted","invested wisely","hidden","recovered"],"answer":0,"rationale":"squander＝浪費/揮霍。","distractorRationale":["B 與『浪費』相反","C 偷換成隱藏","D 與『無法收回』矛盾"]},{"id":"q3","type":"inference","construct":"推論動機","cefr":"C2","stem":"It can be inferred that a government might keep funding an unpromising project because","options":["the project has become profitable","stopping would mean admitting earlier spending was wasted","future costs are guaranteed to be low","economists recommend continuing"],"answer":1,"rationale":"段2-3：放棄＝承認先前投入被浪費＝像承認無能，故傾向續投。","distractorRationale":["A 文中專案是『unpromising』","C 文中無此保證","D 與經濟學理性建議相反"]},{"id":"q4","type":"sentence-simplification","construct":"保留核心意義改寫","cefr":"C2","highlight":"In each case, prior investment, which logically ought to be disregarded, instead distorts the assessment of what remains genuinely worthwhile.","stem":"Which best expresses the essential information in the highlighted sentence? Incorrect choices change the meaning or leave out essential information.","options":["Past spending, which should be ignored, instead warps people's judgment of what is still worth doing.","People correctly ignore past spending when judging what is worthwhile.","Only future costs ever influence people's decisions.","Investments always make decisions more accurate."],"answer":0,"rationale":"核心＝本該忽略的過往投入，反而扭曲了對『還值不值得』的判斷。","distractorRationale":["B 與『instead distorts』相反","C 與全文現象相反","D 與『distorts』相反"]},{"id":"q5","type":"insert-text","construct":"句子邏輯銜接","cefr":"C2","stem":"Look at the squares [A], [B], [C], [D]. Where does this sentence best fit: \"The choice that follows, in other words, is driven by the past rather than by the future.\"","positions":{"A":"在段1『...invested heavily in it.』之後（剛點出人因已投入而續行）","B":"在段2開頭","C":"在段2『...remains genuinely worthwhile.』之後","D":"在段3結尾"},"answer":"A","rationale":"此句是對『因已重金投入而堅持』的同義重述（in other words），最適放在該命題剛提出之後（段1末）。","distractorRationale":["B 段2要開始舉例，插入打斷","C 該處已在講扭曲評估，重述位置偏晚","D 結尾在談理性偏離，語意不接"]},{"id":"q6","type":"prose-summary","construct":"辨主旨、排除細節曲解","cefr":"C2","multiSelect":true,"intro":"People often stick with failing choices because of what they have already invested.","stem":"Choose the TWO statements that express the most important ideas in the passage.","options":["Although sunk costs should be irrelevant, people frequently let prior investment keep them in failing courses of action.","Explanations include not wanting to seem wasteful and loss aversion; the fallacy shows judgment departing from ideal rationality.","Governments fund many film projects.","Loss aversion means people enjoy taking risks.","Economists never make irrational decisions."],"answer":[0,1],"rationale":"A=現象與違反原則（段1-2）；B=解釋與意涵（段3）。為全文主軸。","distractorRationale":["C 是舉例細節且曲解","D 誤解 loss aversion（其實是厭惡損失）","E 與全文（人皆偏離理性）相反"]}]},{"id":"R-temperament-009","section":"reading","format":"2026-adaptive","topic":"Music / Acoustics — Equal Temperament","targetCEFR":"C1","author":"self-authored, original; format calibrated to official 2026 spec; high-C1 (syntactically demanding, music-domain)","passage":"In Western music the octave is divided into twelve notes, yet deciding exactly how to tune them has never been straightforward. The difficulty arises from physics: the intervals that sound most pure to the ear are derived from simple ratios of vibration frequencies, and these ratios cannot all be accommodated within a single scale. Any system tuned to make one key sound flawless will inevitably leave certain other keys noticeably out of tune.\n\nFor centuries musicians tolerated this compromise, favouring a handful of keys and quietly avoiding the rest. The solution that eventually prevailed, known as equal temperament, divides the octave into twelve mathematically identical steps. Under this scheme no interval except the octave remains acoustically pure, yet none is unbearably impure either. Every key sounds equally acceptable, and a composer may move freely from one to another without the harshness that earlier tunings would have produced.\n\nThe adoption of equal temperament was therefore less a discovery than a deliberate trade-off. A slight, evenly distributed imperfection was accepted in exchange for unprecedented flexibility. That bargain made possible the elaborate modulations of later composers, whose works would have been almost unplayable on instruments tuned to privilege a single key.","insertSentence":"Perfection in one place, in short, had always come at the cost of chaos in another.","questions":[{"id":"q1","type":"factual-information","construct":"定位明示事實","cefr":"C1-C2","stem":"According to the passage, why is tuning the twelve notes difficult?","options":["The octave cannot be divided evenly","The pure intervals come from ratios that cannot all fit into one scale","Most instruments cannot play twelve notes","Listeners disagree about which notes sound pure"],"answer":1,"rationale":"段1：純音程源自簡單頻率比，這些比無法全部容進單一音階。","distractorRationale":["A 平均律正是把八度均分，非『不能均分』","C 與樂器能力無關","D 文中未談聽者分歧"]},{"id":"q2","type":"vocabulary","construct":"情境詞義","cefr":"C2","stem":"In paragraph 1, \"accommodated\" is closest in meaning to","options":["fitted in","rejected","amplified","recorded"],"answer":0,"rationale":"『cannot all be accommodated within a single scale』＝無法全部被容納/塞進。","distractorRationale":["B 與『容納』相反","C 偷換成放大","D 與記錄無關"]},{"id":"q3","type":"inference","construct":"推論代價","cefr":"C2","stem":"It can be inferred that, before equal temperament, music in certain keys","options":["sounded better than in favoured keys","sounded noticeably out of tune, so those keys were avoided","could not be written down at all","was preferred by most composers"],"answer":1,"rationale":"段1-2：偏好少數調、悄悄避開其餘＝其餘調明顯走音。","distractorRationale":["A 與『避開』相反","C 過度推論（非不能記譜）","D 與『避免』相反"]},{"id":"q4","type":"sentence-simplification","construct":"保留核心意義改寫","cefr":"C2","highlight":"Under this scheme no interval except the octave remains acoustically pure, yet none is unbearably impure either.","stem":"Which best expresses the essential information in the highlighted sentence? Incorrect choices change the meaning or leave out essential information.","options":["Apart from the octave, every interval is slightly impure, but none is badly out of tune.","Every interval, including the octave, becomes badly out of tune.","Only the octave sounds bad under this system.","All intervals remain perfectly pure under this system."],"answer":0,"rationale":"核心＝除八度外皆略不純，但都不致難以忍受。","distractorRationale":["B 把『none unbearably impure』反成全部很糟，且誤含八度","C 與『八度仍純』相反","D 與『不再純』相反"]},{"id":"q5","type":"insert-text","construct":"句子邏輯銜接","cefr":"C2","stem":"Look at the squares [A], [B], [C], [D]. Where does this sentence best fit: \"Perfection in one place, in short, had always come at the cost of chaos in another.\"","positions":{"A":"在段1『...noticeably out of tune.』之後（剛點出『一調完美必致他調走音』）","B":"在段2開頭","C":"在段2『...one to another...』之後","D":"在段3結尾"},"answer":"A","rationale":"此句是對『一調完美→他調走音』的格言式總結（in short），緊接段1末該命題最自然。","distractorRationale":["B 段2要開始講解方，插入打斷","C 已在談平均律的自由移調，語意相反","D 結尾在談後世作曲，時序不接"]},{"id":"q6","type":"prose-summary","construct":"辨主旨、排除細節曲解","cefr":"C2","multiSelect":true,"intro":"Equal temperament solved an old problem in tuning, but at a price.","stem":"Choose the TWO statements that express the most important ideas in the passage.","options":["Because pure intervals cannot all coexist in one scale, tuning one key well throws others out of tune.","Equal temperament accepts slight, even imperfection everywhere in exchange for the freedom to use any key.","The octave is divided into twelve notes.","Composers disliked equal temperament.","Equal temperament makes every interval perfectly pure."],"answer":[0,1],"rationale":"A=問題本質（段1）；B=平均律的取捨與收益（段2-3）。為全文論證主軸。","distractorRationale":["C 屬背景細節非主旨","D 與『使複雜轉調成為可能』相反","E 與『不再純』相反"]}]}],"listening":[{"id":"L-advising-002","section":"listening","taskType":"listen-conversation","format":"2026","type":"Conversation","topic":"Campus Conversation — Switching an Elective","targetCEFR":"C1","author":"self-authored, original; format calibrated to official 2026 listening spec","script":["Student: Hi Professor Reyes, do you have a minute? I wanted to ask about switching my elective.","Advisor: Of course, come in. You're currently signed up for Introduction to Sociology, right?","Student: Yes, but it now conflicts with a lab session I just got moved into. I was hoping to switch to your Anthropology course instead.","Advisor: That should be possible. The anthropology class still has a few open seats. Have you taken any of the prerequisites?","Student: I took Cultural Studies last semester. Does that count?","Advisor: It does — that satisfies the requirement. The only catch is that you'd be joining two weeks late, so you'll need to catch up on the first readings.","Student: That's fine. Is there a reading list online?","Advisor: Yes, it's all on the course page. I'd start with the chapter on fieldwork methods. And do drop by my office hours if the catch-up feels overwhelming.","Student: Great, thank you. I'll submit the change form today.","Advisor: Perfect. I'll approve it as soon as it comes through."],"questions":[{"id":"q1","type":"gist-purpose","construct":"對話目的","cefr":"B2-C1","stem":"Why does the student go to see the advisor?","options":["To drop out of the semester","To switch from one elective to another","To complain about a professor","To ask for a grade change"],"answer":1,"rationale":"開頭即說『ask about switching my elective』。","distractorRationale":["A 無退選之說","C 無抱怨","D 與成績無關"]},{"id":"q2","type":"detail","construct":"細節","cefr":"C1","stem":"Why does the student want to switch courses?","options":["The current course is too difficult","It now conflicts with a lab session","The professor recommended it","The course was cancelled"],"answer":1,"rationale":"『it now conflicts with a lab session I just got moved into』。","distractorRationale":["A 未提難度","C 非教授建議","D 課程未取消"]},{"id":"q3","type":"detail","construct":"細節","cefr":"C1","stem":"What satisfies the prerequisite for the anthropology course?","options":["Introduction to Sociology","The lab session","Cultural Studies, taken last semester","Office hours attendance"],"answer":2,"rationale":"顧問確認『Cultural Studies … satisfies the requirement』。","distractorRationale":["A 是原本要退的課","B 實驗課與先修無關","D 辦公室時間非先修"]},{"id":"q4","type":"inference","construct":"推論","cefr":"C1","stem":"What does the student need to do because of joining the class late?","options":["Retake Cultural Studies","Catch up on the first readings","Find a new advisor","Drop the lab session"],"answer":1,"rationale":"晚兩週加入→『catch up on the first readings』。","distractorRationale":["A 無需重修","C 無換顧問之說","D 實驗課正是要保留的"]},{"id":"q5","type":"function","construct":"說話用意","cefr":"C1-C2","stem":"Why does the advisor mention his office hours?","options":["To require the student to attend","To offer help if catching up becomes difficult","To explain where the class meets","To reschedule the lab session"],"answer":1,"rationale":"『drop by my office hours if the catch-up feels overwhelming』＝提供補課協助。","distractorRationale":["A 是『if…』非強制","C 與上課地點無關","D 與實驗課改期無關"]}]},{"id":"L-announce-001","section":"listening","taskType":"listen-announcement","format":"2026","type":"Announcement","topic":"Listen to an Announcement — Orientation Room Change","targetCEFR":"B2-C1","author":"self-authored, original; aligned to 2026 'Listen to an Announcement' task","script":["Good morning, everyone, and welcome.","A quick announcement about Friday's orientation session.","The session originally scheduled for Room 204 has been moved to the main auditorium on the ground floor, because we're expecting a larger group than planned.","Please arrive by nine fifteen, as the doors will close at nine thirty sharp.","Remember to bring your student ID and a printed copy of your timetable.","Coffee and tea will be available in the lobby beforehand.","If you can't attend, email the student office before Thursday to arrange a make-up session."],"questions":[{"type":"gist-purpose","stem":"What is the main purpose of this announcement?","options":["To cancel Friday's orientation","To inform students of a change and the details of the orientation","To advertise a coffee morning","To introduce a new student office"],"answer":1,"rationale":"整段在說明更改地點與當天細節。","distractorRationale":["並未取消，只是改地點","","咖啡只是附帶資訊","未介紹新辦公室"]},{"type":"detail","stem":"Where will the orientation now take place?","options":["Room 204","The main auditorium on the ground floor","The lobby","The student office"],"answer":1,"rationale":"『moved to the main auditorium on the ground floor』。","distractorRationale":["那是原本的、已改","大廳只供飲料","辦公室是缺席時聯絡用"]},{"type":"detail","stem":"What should students do if they cannot attend?","options":["Arrive by nine fifteen anyway","Bring their student ID","Email the student office before Thursday","Wait outside Room 204"],"answer":2,"rationale":"『If you can't attend, email the student office before Thursday』。","distractorRationale":["那是給能出席者的","那是出席要帶的","","與內容無關"]}]},{"id":"L-choose-001","section":"listening","taskType":"listen-choose","format":"2026","topic":"Listen and Choose a Response — Campus Life","targetCEFR":"B2-C1","author":"self-authored, original; aligned to 2026 'Listen and Choose a Response' task","instruction":"聽一句話（只播一次），選出最自然、最得體的回應。考的是語用（意圖、口語慣例），不是字面。","items":[{"prompt":"Do you know if the library stays open during exam week?","options":["It's right next to the gym.","Yes — it's open twenty-four hours that week.","I usually read novels.","The exam is on Friday."],"answer":1,"rationale":"對方問『是否開放＋何時』，直接回答開放時間最自然。","distractorRationale":["答位置，未回答是否開放","","離題","答考試日期，非開放時間"]},{"prompt":"I'm thinking of dropping the statistics course. What do you think?","options":["Statistics is a branch of mathematics.","Maybe talk to the professor before you decide.","I dropped my phone yesterday.","The course starts at nine."],"answer":1,"rationale":"對方徵詢意見，給出建議最得體。","distractorRationale":["給定義，非回應徵詢","","誤解 drop 的字面（弄掉）","答時間，離題"]},{"prompt":"Could you let me know when the results are posted?","options":["The results were difficult.","I posted a letter this morning.","Sure, I'll text you as soon as they're up.","Yes, I like the results."],"answer":2,"rationale":"對方提出請求，答應＋說明方式最自然。","distractorRationale":["評論結果，非回應請求","誤解 post（寄信）","","離題"]},{"prompt":"Sorry I'm late — the bus broke down again.","options":["No worries, we've just started.","Buses are a type of vehicle.","You should buy a bus.","I'll be late tomorrow too."],"answer":0,"rationale":"對方道歉，給予寬慰最得體。","distractorRationale":["","給定義，文不對題","不合理的建議","離題、未回應道歉"]},{"prompt":"Would you mind if I joined your study group?","options":["I mind the gap.","Not at all — the more, the better.","Yes, I joined yesterday.","Groups usually have many people."],"answer":1,"rationale":"Would you mind…？答 Not at all＝『不介意，歡迎』，語用正確。","distractorRationale":["雙關誤用 mind","","答非所問且 Yes 反而=介意","給常識，離題"]},{"prompt":"This assignment is due tomorrow, isn't it?","options":["Assignments are important.","I assigned it to you.","Tomorrow is Wednesday.","Actually, the deadline got pushed to Friday."],"answer":3,"rationale":"對方在確認期限，提供更正資訊最自然。","distractorRationale":["泛論，非回應確認","誤解 assign","答星期幾，未回應期限",""]},{"prompt":"Have you had a chance to review my draft yet?","options":["Drafts are early versions.","Not yet, but I'll get to it tonight.","I had a chance once.","Please review the menu."],"answer":1,"rationale":"對方詢問進度，誠實回報＋給時程最得體。","distractorRationale":["給定義，離題","","字面玩 chance，不通","誤用 review，離題"]},{"prompt":"Do you want to grab a coffee after the lecture?","options":["The lecture is about economics.","Coffee grows in warm climates.","Sounds great — I could use a break.","I grabbed my bag."],"answer":2,"rationale":"對方邀約，欣然接受最自然。","distractorRationale":["答講座內容，非回應邀約","給常識，離題","","誤解 grab 的字面"]},{"prompt":"I can't seem to log into the course portal.","options":["Portals are online systems.","Try resetting your password — that fixed it for me.","I logged a lot of hours.","The course is full."],"answer":1,"rationale":"對方陳述困難，給出可行建議最得體。","distractorRationale":["給定義，沒幫忙","","誤用 log（記錄時數）","離題"]},{"prompt":"Professor, could I get an extension on the essay?","options":["Essays should have a thesis.","Extensions make things longer.","I extended my stay last week.","Let's discuss it during office hours."],"answer":3,"rationale":"面對請求，教授提議到 office hours 討論最得體合理。","distractorRationale":["給寫作建議，未回應請求","字面玩 extension","離題",""]}]},{"id":"L-conv-001","section":"listening","taskType":"listen-conversation","format":"2026","type":"Conversation","topic":"Listen to a Conversation — Finding a Source","targetCEFR":"B2-C1","author":"self-authored, original; aligned to 2026 'Listen to a Conversation' task","script":["Student: Hi, I'm looking for a book for my history essay, but the catalog says it's checked out.","Librarian: Let me check. Which title is it?","Student: 'The Age of Revolutions' by Hobsbawm.","Librarian: Ah, that one's popular. It's due back next Tuesday, but I can place a hold for you.","Student: That might be too late — my essay is due Wednesday.","Librarian: In that case, we have an e-book version you can access right away.","Student: Oh, that's perfect. How do I get to it?","Librarian: Log into the library portal, search the title, and click 'online access.'","Student: Great. Do I need anything special to read it?","Librarian: Just your student login — you can read it on any device."],"questions":[{"type":"gist","stem":"What is the student's problem?","options":["The library is closed.","The printed book is checked out and won't return before the essay is due.","The student lost their library card.","The essay topic was rejected."],"answer":1,"rationale":"印刷書被借走，下週二才還、但報告週三要交。","distractorRationale":["未提關館","未提遺失卡","未提題目被拒"]},{"type":"detail","stem":"What does the librarian suggest as a solution?","options":["Waiting until next Tuesday","Choosing a different topic","Accessing the e-book through the library portal","Buying the book online"],"answer":2,"rationale":"館員建議改用電子書，從 portal 進入即可。","distractorRationale":["太晚，學生說來不及","未建議換題","未建議購買"]}]},{"id":"L-migration-001","section":"listening","taskType":"listen-talk","format":"2026","type":"Academic Talk","topic":"Biology Lecture — Animal Navigation","targetCEFR":"C1","author":"self-authored, original; format calibrated to official 2026 listening spec","script":["Today we're going to look at how animals find their way during long migrations.","Take the Arctic tern, a small seabird that travels from the Arctic to the Antarctic and back every single year.","That's a round trip of roughly seventy thousand kilometers — the longest migration of any animal on Earth.","So how do they manage it? Researchers believe they rely on several cues at the same time.","During the day, many birds use the position of the sun, adjusting for the time of day.","At night, some species orient themselves by the patterns of the stars.","And perhaps most remarkably, many migratory animals can detect the Earth's magnetic field, almost like a built-in compass.","Here's the key point: no single cue is essential.","If clouds hide the sun, or the magnetic signal is disturbed, the animal simply switches to another cue.","This backup system — what biologists call redundancy — is exactly why their navigation stays so reliable, even in bad weather."],"questions":[{"id":"q1","type":"gist","construct":"主旨","cefr":"B2-C1","stem":"What is the lecture mainly about?","options":["Why the Arctic tern is endangered","How migratory animals find their way","How birds build their nests","Why animals migrate in winter"],"answer":1,"rationale":"全篇圍繞『動物如何導航』展開。","distractorRationale":["A 未談瀕危","C 與築巢無關","D 講的是『如何導航』非『為何遷徙』"]},{"id":"q2","type":"detail","construct":"細節","cefr":"C1","stem":"Why does the professor mention the Arctic tern?","options":["To give an example of the longest animal migration","To show that seabirds cannot navigate well","To explain how birds use the magnetic field","To compare it with the Antarctic tern"],"answer":0,"rationale":"Arctic tern 被舉為『最長遷徙』的例子。","distractorRationale":["B 與文意相反","C 海王星…磁場是後面通則，非舉燕鷗的目的","D 文中無此比較"]},{"id":"q3","type":"detail","construct":"細節","cefr":"C1","stem":"According to the professor, how do some birds navigate at night?","options":["By following coastlines","By the patterns of the stars","By listening for other birds","By the position of the sun"],"answer":1,"rationale":"『At night, some species orient themselves by the patterns of the stars.』","distractorRationale":["A 未提海岸線","C 未提聲音","D 那是白天用太陽"]},{"id":"q4","type":"function","construct":"說話功能/用意","cefr":"C1-C2","stem":"Why does the professor say, \"no single cue is essential\"?","options":["To argue that animals navigate poorly","To emphasize that animals can switch cues, which keeps navigation reliable","To prove the magnetic field is the only cue that matters","To suggest that birds rarely migrate in bad weather"],"answer":1,"rationale":"緊接著說明：某個線索失效就換另一個→冗餘使導航可靠。","distractorRationale":["A 與『可靠』相反","C 與『沒有單一線索是必要』相反","D 文意是壞天氣仍可靠導航"]},{"id":"q5","type":"inference","construct":"推論","cefr":"C1-C2","stem":"What can be inferred about navigation on a cloudy night?","options":["The animal would be completely lost.","The animal could still navigate using another cue, such as the magnetic field.","The animal would wait until the sky cleared.","The animal would rely only on the stars."],"answer":1,"rationale":"雲遮星/日時，動物切換到其他線索（如磁場）→ 仍能導航。","distractorRationale":["A 與冗餘機制相反","C 文中無『等待』之說","D 多雲時看不到星，邏輯矛盾"]}]},{"id":"L-sleep-003","section":"listening","taskType":"listen-talk","format":"2026","type":"Academic Talk","topic":"Psychology Lecture — Sleep and Memory","targetCEFR":"C1","author":"self-authored, original; format calibrated to official 2026 listening spec","script":["In today's session, I want to talk about why sleep matters for learning.","It might seem that staying awake to study longer is always better, but the research suggests otherwise.","During sleep, especially deep sleep, the brain appears to replay and strengthen the connections formed while you were awake.","This process, called consolidation, helps move fragile new memories into more stable, long-term storage.","In one classic experiment, students who slept after learning a list of words recalled far more of them the next day than students who stayed awake.","And interestingly, it isn't only facts that benefit.","Skills that involve movement — like playing a piece of music — also improve after a night's sleep, even without extra practice.","There's a practical lesson here: cramming all night before an exam can actually backfire.","You may feel you've covered more material, but without sleep, much of it never gets properly stored.","So the next time you're tempted to skip sleep to study, remember that those hours of rest are doing real cognitive work."],"questions":[{"id":"q1","type":"gist","construct":"主旨","cefr":"B2-C1","stem":"What is the lecture mainly about?","options":["How to fall asleep faster","Why sleep is important for memory and learning","The dangers of too much sleep","How musicians practice"],"answer":1,"rationale":"全篇圍繞睡眠對記憶/學習的重要性。","distractorRationale":["A 未談入睡技巧","C 與『太多睡眠的危險』相反","D 音樂只是舉例"]},{"id":"q2","type":"detail","construct":"細節","cefr":"C1","stem":"According to the professor, what does consolidation do?","options":["It keeps the brain awake during sleep","It moves fragile new memories into more stable, long-term storage","It erases unimportant memories","It speeds up reading"],"answer":1,"rationale":"明確定義：consolidation 把脆弱新記憶移入穩定長期儲存。","distractorRationale":["A 與睡眠中發生矛盾","C 文中是強化非抹除","D 與閱讀速度無關"]},{"id":"q3","type":"detail","construct":"細節","cefr":"C1","stem":"What did the word-list experiment show?","options":["Students who stayed awake remembered more","Students who slept afterward recalled far more words","Sleep had no effect on memory","Only movement skills improved"],"answer":1,"rationale":"睡了的學生隔天記得遠比熬夜者多。","distractorRationale":["A 方向相反","C 與實驗結果相反","D 那是另一個論點"]},{"id":"q4","type":"function","construct":"說話用意","cefr":"C1-C2","stem":"Why does the professor mention playing a piece of music?","options":["To show that even movement skills improve after sleep, not just facts","To suggest students should learn an instrument","To prove that practice is unnecessary","To change the topic to music"],"answer":0,"rationale":"緊接『不只事實受益』，舉演奏為例證明動作技能也因睡眠改善。","distractorRationale":["B 非建議學樂器","C 過度推論（仍需先練）","D 並非轉題"]},{"id":"q5","type":"inference","construct":"推論","cefr":"C1-C2","stem":"What can be inferred about studying all night before an exam?","options":["It is the most effective strategy","It can backfire because material may not be properly stored without sleep","It improves movement skills only","It guarantees higher recall"],"answer":1,"rationale":"熬夜雖覆蓋更多，但缺睡眠→未妥善儲存→可能適得其反。","distractorRationale":["A 與『backfire』相反","C 曲解","D 與『never gets properly stored』相反"]}]},{"id":"L-talk-003","section":"listening","taskType":"listen-talk","format":"2026","type":"Academic Talk","topic":"Listen to an Academic Talk — Bioluminescence","targetCEFR":"C1","author":"self-authored, original; aligned to 2026 'Listen to an Academic Talk' task","script":["Today we're looking at bioluminescence — the ability of living organisms to produce their own light.","It's surprisingly common in the ocean; in fact, the majority of deep-sea creatures can glow.","The light comes from a chemical reaction: a molecule called luciferin reacts with oxygen, and an enzyme speeds the process up.","Unlike a light bulb, almost no heat is given off, so we call it 'cold light.'","Now, why would an animal evolve this ability? There are several reasons.","Some species use light to attract prey — the anglerfish dangles a glowing lure in front of its mouth.","Others use it for defense; certain squid release a cloud of glowing liquid to confuse a predator while they escape.","And many use light to communicate, especially to find a mate in the darkness.","What's striking is that the same basic chemistry appears in organisms that aren't closely related at all.","That suggests bioluminescence evolved independently many times, which means it must offer a real survival advantage."],"questions":[{"type":"gist","stem":"What is the talk mainly about?","options":["How light bulbs work","How and why organisms produce their own light","Why the deep sea is dark","How fish find food in general"],"answer":1,"rationale":"全段談發光的機制與演化原因。","distractorRationale":["燈泡只是對比","未以海洋黑暗為主題","覓食只是其中一例"]},{"type":"detail","stem":"According to the talk, what produces the light?","options":["Heat from the body","Sunlight stored during the day","Luciferin reacting with oxygen, sped up by an enzyme","Electric currents in the water"],"answer":2,"rationale":"『luciferin reacts with oxygen, and an enzyme speeds the process up』。","distractorRationale":["相反，幾乎不發熱","未提儲存日光","未提電流"]},{"type":"detail","stem":"Why does the anglerfish use light?","options":["To attract prey","To scare predators","To find its way home","To stay warm"],"answer":0,"rationale":"『attract prey — the anglerfish dangles a glowing lure』。","distractorRationale":["那是 squid 的防禦用途","未提導航","冷光不供暖"]},{"type":"inference","stem":"What does the independent evolution of bioluminescence suggest?","options":["It is a recent development","It offers a real survival advantage","It only occurs in fish","It is disappearing"],"answer":1,"rationale":"多次獨立演化→暗示有實際生存優勢（講者明說）。","distractorRationale":["未說是近期","出現在多種不相關生物，非僅魚類","未提消失"]}]}],"writing":[{"id":"W-build-003","section":"writing","taskType":"build-sentence","format":"2026","topic":"Build a Sentence — Advanced (C1→C2)","level":"C1–C2","timeLimit":6,"author":"self-authored, original; aligned to 2026 'Build a Sentence' task","intro":"C2 級句構：倒裝、cleft、精簡關係子句、讓步倒裝、名詞化、混合條件、假設語氣。這些正是把寫作/口說從 4 拉到 5+ 的句型。","items":[{"scenario":"描述事情接連發生。","focus":"倒裝 (Hardly… when)","answer":["Hardly","had we","sat down","when","the phone rang."],"sentence":"Hardly had we sat down when the phone rang.","why":"Hardly 置句首引發倒裝（had we sat down），搭配 when 表「一…就…」。","trap":"誤排 'Hardly we had sat down when the phone rang.' → Hardly 句首必須倒裝（had we）。"},{"scenario":"強調最重要的東西。","focus":"準分裂句 (What… is)","answer":["What I","need most","is","a quiet place","to focus."],"sentence":"What I need most is a quiet place to focus.","why":"What 子句當主詞（What I need most），is 連接強調成分（a quiet place to focus）。","trap":"誤排 'Is what I need most a quiet place to focus.' → What 子句須完整置於 is 之前。"},{"scenario":"通知面試結果。","focus":"精簡關係子句 (過去分詞)","answer":["Candidates","selected","for the interview","will receive","an email."],"sentence":"Candidates selected for the interview will receive an email.","why":"selected for the interview ＝ who are selected… 的精簡，緊貼先行詞 Candidates。","trap":"誤排 'Candidates will receive an email selected for the interview.' → 精簡關係子句應緊貼先行詞。"},{"scenario":"承認過程艱難。","focus":"讓步倒裝 (Adjective + as)","answer":["Difficult","as it was,","we","completed","the project."],"sentence":"Difficult as it was, we completed the project.","why":"形容詞前置＋as 表讓步（雖然很難）；逗號後接主句。","trap":"誤排 'As difficult it was, we completed the project.' → 此結構須『形容詞＋as』（Difficult as it was）。"},{"scenario":"學術語氣。","focus":"形式受詞 it (make it + adj + to-inf)","answer":["The lack","of funding","made it difficult","to continue","the research."],"sentence":"The lack of funding made it difficult to continue the research.","why":"it 為形式受詞，指代後面的 to continue the research；The lack of funding 為名詞化主詞。","trap":"誤排 'The lack of funding made to continue the research difficult.' → 真受詞 to-inf 須後置，形式受詞 it 緊接 made。"},{"scenario":"回顧過去的選擇。","focus":"混合條件句 (過去條件→現在結果)","answer":["If I had","studied medicine,","I would be","a doctor","now."],"sentence":"If I had studied medicine, I would be a doctor now.","why":"if＋過去完成（had studied）→ 主句 would be＋now（現在結果）；條件在過去、結果在現在。","trap":"誤排 'If I had studied medicine, I would have been a doctor now.' → now 指現在，主句用 would be，非 would have been。"},{"scenario":"文學式強調。","focus":"否定副詞前置倒裝 (Never before)","answer":["Never before","had","the city","seen","such celebrations."],"sentence":"Never before had the city seen such celebrations.","why":"否定副詞 Never before 置句首引發倒裝（had the city seen）。","trap":"誤排 'Never before the city had seen such celebrations.' → 否定副詞句首必須倒裝（had the city）。"},{"scenario":"描述你欣賞的人。","focus":"非限定關係子句 (whose)","answer":["The author,","whose work","I admire,","is speaking","tonight."],"sentence":"The author, whose work I admire, is speaking tonight.","why":"whose work I admire 以逗號夾住補充說明 The author；主句 is speaking tonight。","trap":"誤排 'The author is speaking tonight, whose work I admire.' → whose 子句應緊貼先行詞 The author。"},{"scenario":"描述程度與結果。","focus":"so + adj + that (結果子句)","answer":["The lecture was","so interesting","that","no one","left early."],"sentence":"The lecture was so interesting that no one left early.","why":"so interesting 表程度，that 引導結果子句（no one left early）。","trap":"誤排 'The lecture was so that no one left early interesting.' → so 直接修飾 interesting，that 結果子句置後。"},{"scenario":"正式建議。","focus":"命令式假設語氣 (recommend that + 原形 be)","answer":["The committee","recommended that","the policy","be reviewed","annually."],"sentence":"The committee recommended that the policy be reviewed annually.","why":"recommend/suggest that 後用原形（be reviewed），不隨主詞或時態變化。","trap":"誤排 'The committee recommended that the policy is reviewed annually.' → 命令式假設語氣用原形 be，非 is。"}]},{"id":"W-build-002","section":"writing","taskType":"build-sentence","format":"2026","topic":"Build a Sentence — Complex Structures (C1)","level":"C1","timeLimit":6,"author":"self-authored, original; aligned to 2026 'Build a Sentence' task","intro":"C1 級句構：關係子句、分詞片語、cleft、倒裝、被動、條件句。先抓主句骨幹，再判斷修飾語該掛在哪。","items":[{"scenario":"介紹你的家鄉。","focus":"非限定關係子句 (which，逗號)","answer":["My hometown,","which is","near the coast,","attracts","many tourists."],"sentence":"My hometown, which is near the coast, attrac
