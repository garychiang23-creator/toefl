ts many tourists.","why":"非限定子句用兩個逗號夾住，補充說明 My hometown；主句動詞 attracts 在子句之後。","trap":"誤排 'My hometown attracts many tourists, which is near the coast.' → which 應緊貼先行詞 My hometown，否則像在修飾 tourists。"},{"scenario":"描述同時發生的動作。","focus":"現在分詞片語 (表原因，前置)","answer":["Feeling exhausted,","she","decided","to take","a break."],"sentence":"Feeling exhausted, she decided to take a break.","why":"Feeling exhausted 為分詞片語表原因，其邏輯主詞須與主句一致（she）。","trap":"誤排 'She decided to take a break, feeling exhausted.' 雖可，但本題首塊大寫＝前置；'She feeling exhausted decided…' 則分詞片語誤插主句中間。"},{"scenario":"描述一個老建築。","focus":"過去分詞片語 (前置)","answer":["Built","in 1920,","the bridge","still stands","today."],"sentence":"Built in 1920, the bridge still stands today.","why":"Built in 1920 為被動分詞片語修飾 the bridge；逗號後接主句 the bridge still stands。","trap":"誤排 'The bridge still stands today, built in 1920.' 雖可，但本題 Built 大寫＝句首；'Built the bridge in 1920…' 則主詞遺失。"},{"scenario":"強調是誰做的。","focus":"分裂句 (It-cleft)","answer":["It was","my sister","who","solved","the problem."],"sentence":"It was my sister who solved the problem.","why":"It was ＋ 強調成分（my sister）＋ who ＋ 其餘，用來凸顯 my sister。","trap":"誤排 'My sister it was who solved the problem.' → cleft 結構必須以 It 起首。"},{"scenario":"談一個假設。","focus":"第二類條件句 (與現在事實相反)","answer":["If I had","more time,","I would","learn","another language."],"sentence":"If I had more time, I would learn another language.","why":"if ＋ 過去式（had）→ 主句 would ＋ 原形（learn）；表與現在相反的假設。","trap":"誤排 'If I would have more time, I learn another language.' → 條件句不用 would、主句才用 would＋原形。"},{"scenario":"描述一個流程。","focus":"被動語態＋行為者 (by)","answer":["The results","were analyzed","by","an independent","team."],"sentence":"The results were analyzed by an independent team.","why":"被動 be＋p.p.（were analyzed）＋by＋行為者（an independent team）。","trap":"誤排 'The results by an independent team were analyzed.' → by 片語應接在被動動詞之後。"},{"scenario":"給建議。","focus":"動名詞片語當主詞","answer":["Learning","a new skill","takes","time","and patience."],"sentence":"Learning a new skill takes time and patience.","why":"動名詞片語 Learning a new skill 當主詞，視為單數，動詞用 takes。","trap":"誤排 'Takes time and patience learning a new skill.' → 動名詞主詞應在句首。"},{"scenario":"加強語氣。","focus":"Not only 倒裝","answer":["Not only","did he apologize,","but he also","fixed","the mistake."],"sentence":"Not only did he apologize, but he also fixed the mistake.","why":"Not only 置句首引發倒裝（did he apologize），後接 but (he) also。","trap":"誤排 'Not only he apologized, but he also fixed the mistake.' → Not only 句首必須倒裝助動詞 did。"},{"scenario":"描述一個地點。","focus":"關係副詞 (where)","answer":["This is","the room","where","the meeting","will be held."],"sentence":"This is the room where the meeting will be held.","why":"where 引導關係子句修飾地點 the room；子句 the meeting will be held。","trap":"誤排 'This is the room the meeting will be held where.' → where 須在關係子句句首。"},{"scenario":"承認困難仍達成。","focus":"Despite ＋ 名詞片語","answer":["Despite","the heavy traffic,","they","arrived","on time."],"sentence":"Despite the heavy traffic, they arrived on time.","why":"Despite 後接名詞片語（the heavy traffic），不接子句；逗號後接主句。","trap":"誤排 'Despite they arrived on time, the heavy traffic.' → despite 後不接子句，且邏輯顛倒。"}]},{"id":"W-build-001","section":"writing","taskType":"build-sentence","format":"2026","topic":"Build a Sentence — Foundations (B2→C1)","level":"B2–C1","timeLimit":6,"author":"self-authored, original; aligned to 2026 'Build a Sentence' task","intro":"把詞塊排成一個正確的句子。技巧：先找出主句（主詞＋主要動詞），再把連接詞與子句接上去。首塊已大寫＝句首，末塊有句點＝句尾。","items":[{"scenario":"告訴同事你的安排。","focus":"時間副詞子句 (as soon as)","answer":["I'll send","you the file","as soon as","I get back","to my desk."],"sentence":"I'll send you the file as soon as I get back to my desk.","why":"主句先立（I'll send you the file），as soon as 直接帶完整子句（I get back to my desk）。","trap":"誤排 'I'll send you the file I get back as soon as to my desk.' → as soon as 必須緊接它引導的子句，不能被拆開。"},{"scenario":"解釋你為什麼遲到。","focus":"原因子句 (because)","answer":["I missed the bus","because","my alarm","didn't","go off."],"sentence":"I missed the bus because my alarm didn't go off.","why":"because 引導原因子句，內含完整 S+V（my alarm didn't go off）。","trap":"誤把 because 放句尾（'My alarm didn't go off I missed the bus because.'）→ 連接詞不放句尾。"},{"scenario":"描述一位同事。","focus":"限定關係子句 (who，主格)","answer":["The manager","who","interviewed me","was","very friendly."],"sentence":"The manager who interviewed me was very friendly.","why":"who interviewed me 緊接先行詞 The manager 修飾它；主句動詞 was 在關係子句之後。","trap":"誤排 'The manager was very friendly who interviewed me.' → 關係子句離先行詞太遠，指涉不清。"},{"scenario":"談一本書。","focus":"限定關係子句 (that，受格)","answer":["The book","that","you recommended","is","really helpful."],"sentence":"The book that you recommended is really helpful.","why":"that you recommended 修飾 The book；主句動詞 is 接在關係子句之後。","trap":"誤排 'The book is really helpful that you recommended.' → 關係子句應緊貼先行詞 The book。"},{"scenario":"給一個平衡的看法。","focus":"讓步子句 (although，前置)","answer":["Although","it was raining,","we","still enjoyed","the trip."],"sentence":"Although it was raining, we still enjoyed the trip.","why":"although 子句前置時，逗號後接主句（we still enjoyed the trip）。","trap":"誤排 'Although we still enjoyed the trip, it was raining.' → 讓步與主句對調，邏輯反了。"},{"scenario":"解釋一個決定。","focus":"目的不定詞 (to-infinitive)","answer":["She","took a second job","to save","money","for college."],"sentence":"She took a second job to save money for college.","why":"to save money 表目的，接在主句（She took a second job）之後。","trap":"誤排 'She to save took a second job money for college.' → 目的不定詞片語不可插進主句中間。"},{"scenario":"做一個承諾。","focus":"第一類條件句 (if 前置)","answer":["If you help me today,","I'll","return","the favor","next week."],"sentence":"If you help me today, I'll return the favor next week.","why":"if 子句前置＋逗號，主句用 will（I'll return the favor）。","trap":"誤排 'If you help me today, the favor I'll return next week.' → 主句應 S+will+V+O，受詞不前置。"},{"scenario":"轉達一則訊息。","focus":"間接引述 (reported speech)","answer":["She said","that","she would","call me","later."],"sentence":"She said that she would call me later.","why":"said that 後接子句，時態後移（will→would）；that 子句緊接 said。","trap":"誤排 'She would call me that she said later.' → that 子句必須接在引述動詞 said 之後。"},{"scenario":"描述一個習慣。","focus":"頻率副詞位置","answer":["He","usually","checks","his email","before breakfast."],"sentence":"He usually checks his email before breakfast.","why":"頻率副詞 usually 放在主詞與主要動詞之間（He usually checks）。","trap":"誤排 'He checks his email usually before breakfast.' → usually 不放在動詞＋受詞之後。"},{"scenario":"說明一個結果。","focus":"結果連接詞 (so)","answer":["The store","was closed,","so","we went","somewhere else."],"sentence":"The store was closed, so we went somewhere else.","why":"so 連接兩個對等子句表結果；前句逗號＋so＋第二主句。","trap":"誤排 'So the store was closed, we went somewhere else.' → so 不放句首連接兩個主句。"}]},{"id":"W-disc-002","section":"writing","taskType":"write-discussion","format":"2026","topic":"Academic Discussion — Age and Language Learning","author":"self-authored, original; aligned to 2026 'Write for an Academic Discussion' task","timeLimit":10,"wordRange":[100,130],"prompt":{"scenario":"Your professor has posted a question on the class discussion board. Two classmates have replied. Write a post that states your own view and responds to at least one classmate by name. (100–130 words)","question":"Some argue that learning a second language is most effective when started in early childhood; others say teenagers and adults can learn just as well with the right methods. What does the evidence suggest, and what would you prioritize in a national language policy?","peers":[{"name":"Dana","post":"Young children pick up accents naturally — earlier is clearly better."},{"name":"Omar","post":"Adults learn grammar faster because they can study consciously."}]},"rubric":{"scale":"0–5","dims":[{"k":"Position","b5":"立場明確且即時表態，並承認問題的複雜性","b3":"有立場但偏弱（如僅 I think），未統整對立面"},{"k":"Reasoning & Support","b5":"理由充分發展，並有具體例子或概念支撐","b3":"有理由但籠統、缺具體例"},{"k":"Peer Engagement","b5":"點名並實質推進同學論點（讓步／反駁／延伸）","b3":"點名但僅附和、未推進對話"},{"k":"Language Use","b5":"句構多樣、用詞精準、近乎無妨礙理解的錯誤","b3":"以簡單句為主，偶有錯誤但不太妨礙理解"}]},"models":[{"score":3,"sectionBand":"≈5.0","label":"達標基準","scores":{"Position":3,"Reasoning & Support":3,"Peer Engagement":2,"Language Use":3},"sentences":[{"t":"I think it is better to start learning a language when you are a child.","note":"立場清楚但 I think 偏弱、未統整對立面。","dim":"Position"},{"t":"Children can learn the accent very well and they are not afraid to make mistakes. So they speak more naturally.","note":"兩個理由，但無證據或具體例。","dim":"Reasoning & Support"},{"t":"Dana is right that young children pick up accents naturally.","note":"點名 Dana 但只附和＝弱互動。","dim":"Peer Engagement"},{"t":"Adults can also learn, but it is harder for them to sound like a native speaker.","note":"承認反面，但籠統。","dim":"Reasoning & Support"},{"t":"So a country should teach languages early in school.","note":"收束立場。","dim":"Position"}],"delta":"升到 4 的關鍵：互動要推進（部分同意 Omar 再反駁，而非只附和 Dana）；補具體例或概念（關鍵期假說）；換掉 I think 與 very well 等弱詞。"},{"score":4,"sectionBand":"≈5.5","label":"良好","scores":{"Position":4,"Reasoning & Support":4,"Peer Engagement":4,"Language Use":4},"sentences":[{"t":"Although adults have real strengths, I'd prioritize starting languages in early childhood.","note":"讓步＋明確表態＝成熟立場句。","dim":"Position"},{"t":"Young learners absorb pronunciation and rhythm almost effortlessly, which is the hardest part to fix later.","note":"點出關鍵差異，論點有發展。","dim":"Reasoning & Support"},{"t":"Omar is right that adults learn grammar rules faster, but rules don't automatically produce natural speech, and many adult learners stay fluent yet noticeably accented.","note":"點名 Omar、讓步再反駁＝真正推進對話。","dim":"Peer Engagement"},{"t":"For instance, my cousin moved abroad at six and now sounds native, while my uncle, who studied hard at forty, still struggles with sounds.","note":"對比性具體例支撐。","dim":"Reasoning & Support"},{"t":"So a national policy should introduce languages in primary school, while still funding good adult programs.","note":"收束並整合對立面。","dim":"Position"}],"delta":"升到 5 的關鍵：可引一個概念/研究（critical period）讓論點更學術；同時實質回應兩位同學；語言更精準多樣、近零錯誤。"},{"score":5,"sectionBand":"≈6.0","label":"頂標","scores":{"Position":5,"Reasoning & Support":5,"Peer Engagement":5,"Language Use":5},"sentences":[{"t":"Adults clearly have advantages, but I'd prioritize early childhood for language learning.","note":"立場果斷且承認複雜性。","dim":"Position"},{"t":"The reason is the so-called critical period: young brains map new sounds almost automatically, whereas after puberty that flexibility fades, which is why accents are so hard to shed later.","note":"引入概念（critical period）＋因果，論點學術且充分。","dim":"Reasoning & Support"},{"t":"Omar is right that adults learn grammar consciously and quickly, yet conscious rules rarely become fluent, intuitive speech — exactly where children excel.","note":"點名 Omar、實質讓步再反轉。","dim":"Peer Engagement"},{"t":"Dana's point about natural accents fits my own family: my cousin emigrated at six and passes for a native speaker, while my uncle, despite years of disciplined study, still pauses over basic sounds.","note":"點名 Dana 並用具體家庭例佐證＝把同學論點化為證據。","dim":"Peer Engagement"},{"t":"So I'd start languages in primary school and keep strong adult programs as a complement.","note":"精煉收束、整合長短期。","dim":"Position"}],"delta":"已達頂帶：立場果斷、引概念支撐、與兩位同學都實質互動、具體對比例、句構多樣近零錯誤，且控制在 100–130 字。"}]},{"id":"W-disc-001","section":"writing","taskType":"write-discussion","format":"2026","topic":"Academic Discussion — City Environmental Priorities","author":"self-authored, original; aligned to 2026 'Write for an Academic Discussion' task","timeLimit":10,"wordRange":[100,130],"prompt":{"scenario":"Your professor has posted a question on the class discussion board. Two classmates have replied. Write a post that states your own view and responds to at least one classmate by name. (100–130 words)","question":"Some argue the most effective way for a city to cut its environmental impact is investing in public transportation; others say it is regulating construction to be more energy-efficient. Which should a city prioritize, and why?","peers":[{"name":"Kevin","post":"Public transport matters most — fewer cars means less pollution immediately."},{"name":"Mei","post":"But buildings use energy for decades; efficient construction lasts longer."}]},"rubric":{"scale":"0–5","dims":[{"k":"Position","b5":"立場明確且即時表態，並承認問題的複雜性","b3":"有立場但偏弱（如僅 I think），未統整對立面"},{"k":"Reasoning & Support","b5":"理由充分發展，並有具體例子或概念支撐","b3":"有理由但籠統、缺具體例"},{"k":"Peer Engagement","b5":"點名並實質推進同學論點（讓步／反駁／延伸）","b3":"點名但僅附和、未推進對話"},{"k":"Language Use","b5":"句構多樣、用詞精準、近乎無妨礙理解的錯誤","b3":"以簡單句為主，偶有錯誤但不太妨礙理解"}]},"models":[{"score":3,"sectionBand":"≈5.0","label":"達標基準","scores":{"Position":3,"Reasoning & Support":3,"Peer Engagement":2,"Language Use":3},"sentences":[{"t":"I think public transportation is more important for a city.","note":"立場清楚，但用 I think 偏弱、未統整對立面。","dim":"Position"},{"t":"If there are more buses and trains, people will not drive cars, so there is less pollution. This is good for the air.","note":"有因果鏈，但結論（good for the air）空泛、無具體例。","dim":"Reasoning & Support"},{"t":"Kevin is right that fewer cars means less pollution.","note":"點名 Kevin，但只是附和、未推進其論點＝弱互動。","dim":"Peer Engagement"},{"t":"Buildings also use energy, but I think transport is the bigger problem because there are so many cars every day.","note":"有比較，但 because 後仍籠統。","dim":"Reasoning & Support"},{"t":"So cities should spend money on public transport first.","note":"收束重申立場。","dim":"Position"}],"delta":"升到 4 的關鍵：與同學要『推進』而非附和（例如部分同意 Mei 再補理由反駁）；加一個**具體例子**（某城市/某數據）；用更明確的立場句替代 I think。"},{"score":4,"sectionBand":"≈5.5","label":"良好","scores":{"Position":4,"Reasoning & Support":4,"Peer Engagement":4,"Language Use":4},"sentences":[{"t":"While both ideas help, I believe a city should prioritize public transportation.","note":"先承認雙方再明確表態＝成熟的立場句。","dim":"Position"},{"t":"Cars are used every single day, so cutting them has an immediate, city-wide effect on air quality — something efficient buildings cannot match in the short term.","note":"因果＋對比，論點有發展。","dim":"Reasoning & Support"},{"t":"Mei makes a fair point that buildings save energy for decades, but new construction is slow, whereas adding bus routes can change commuting habits within months.","note":"點名 Mei、先讓步再反駁＝真正推進對話。","dim":"Peer Engagement"},{"t":"For example, when my city added a subway line, traffic on the main road dropped noticeably.","note":"具體例子支撐論點。","dim":"Reasoning & Support"},{"t":"So I'd put transport first, and tighten building codes as a longer-term goal.","note":"收束並整合對立面。","dim":"Position"}],"delta":"升到 5 的關鍵：例子可更具體（數據/地名/時間框）；同時實質回應兩位同學；語言更精準多樣，把『立場—理由—例—回應』在字數內織得更緊。"},{"score":5,"sectionBand":"≈6.0","label":"頂標","scores":{"Position":5,"Reasoning & Support":5,"Peer Engagement":5,"Language Use":5},"sentences":[{"t":"Both priorities matter, but I'd argue a city should invest in public transportation first.","note":"立場果斷且承認複雜性。","dim":"Position"},{"t":"Vehicles pollute every single day, so expanding buses and trains cuts emissions immediately and reaches the whole population at once — an effect energy codes simply can't deliver in the short run.","note":"多層因果＋對比，論點充分發展。","dim":"Reasoning & Support"},{"t":"Mei rightly notes that efficient buildings pay off for decades, and I agree that's the better long-term bet; the problem is timing, since new construction replaces the existing stock very slowly.","note":"點名 Mei、實質讓步再以『timing』反轉＝高品質互動。","dim":"Peer Engagement"},{"t":"Kevin's point about fewer cars is exactly why, after my city opened a light-rail line, rush-hour traffic and roadside smog both fell within a year.","note":"同時點名 Kevin，並用具體例＋時間框佐證＝把同學論點化為自己的證據。","dim":"Peer Engagement"},{"t":"So: transport now, stricter building codes next.","note":"精煉收束，整合長短期。","dim":"Position"}],"delta":"已達頂帶：立場果斷、論點多層發展、與兩位同學都實質互動、具體例帶時間框、句構多樣近零錯誤，且控制在 100–130 字。"}]},{"id":"W-email-002","section":"writing","taskType":"write-email","format":"2026","topic":"Write an Email — Tell Your Instructor You'll Miss a Field Trip","author":"self-authored, original; aligned to 2026 'Write an Email' task","timeLimit":7,"wordRange":[80,120],"prompt":{"scenario":"Your course has a museum field trip this Friday, but you cannot attend. Write an email to your instructor, Professor Lin.","bullets":["Explain why you cannot attend","Ask what you will miss","Propose a specific way to make up the work"]},"rubric":{"scale":"0–5","dims":[{"k":"Task Completion","b5":"三個 bullet 全覆蓋，補救方案具體可執行","b3":"三點大致覆蓋，但補救方案空泛（『做點什麼補』）未真正完成"},{"k":"Tone / Register","b5":"對教授的正式語氣完全得體、請求句型恰當","b3":"語氣大致禮貌，但偶生硬或直白"},{"k":"Organization","b5":"目的句開場、逐點推進、禮貌收束，銜接順","b3":"結構可辨識，銜接以簡單連接為主"},{"k":"Language Use","b5":"句構多樣、用詞精準、幾乎無妨礙理解的錯誤","b3":"以簡單句為主，偶有錯誤但不太妨礙理解"}]},"models":[{"score":3,"sectionBand":"≈5.0","label":"達標基準","scores":{"Task Completion":3,"Tone / Register":3,"Organization":3,"Language Use":3},"sentences":[{"t":"Dear Professor Lin,","note":"正式稱呼，對教授得體。","dim":"Tone / Register"},{"t":"I am writing about the museum field trip this Friday.","note":"開門見山點主題，清楚。","dim":"Organization"},{"t":"I am sorry but I cannot come because I have a doctor's appointment that morning.","note":"bullet 1 完成、有原因，但 but 接得略生硬。","dim":"Task Completion"},{"t":"Can you tell me what we will do on the trip? I do not want to miss important information.","note":"bullet 2 完成，措辭直白（Can you 不如 Could you 得體）。","dim":"Task Completion"},{"t":"Maybe I can do something to make it up. Please let me know what is possible.","note":"bullet 3 只說『做點什麼補』＝未提具體方案，未真正完成。","dim":"Task Completion"},{"t":"Thank you, Mei","note":"結尾尚可。","dim":"Tone / Register"}],"delta":"升到 4 的關鍵：bullet 3 要提**具體**補救（如自行參觀後交一篇心得）；多用得體請求句（Would it be possible…）；把簡單句串成有目的的段落。"},{"score":4,"sectionBand":"≈5.5","label":"良好","scores":{"Task Completion":4,"Tone / Register":4,"Organization":4,"Language Use":4},"sentences":[{"t":"Dear Professor Lin,","note":"正式得體。","dim":"Tone / Register"},{"t":"I am writing to let you know that I won't be able to join the museum field trip this Friday, as I have a medical appointment I couldn't reschedule.","note":"bullet 1 完成，理由具體並說明『無法改期』＝更有說服力。","dim":"Task Completion"},{"t":"I'm sorry to miss it.","note":"簡短致歉，語氣恰當。","dim":"Tone / Register"},{"t":"Could you let me know which exhibits or tasks we'll cover, so I can keep up with the class?","note":"bullet 2 完成，用 Could you… 得體並說明目的。","dim":"Task Completion"},{"t":"To make up for it, I'd be glad to visit the museum on my own over the weekend and write a short report on the same exhibits.","note":"bullet 3 提**具體**補救方案＝完成度明顯提高。","dim":"Task Completion"},{"t":"Please let me know if that would work.","note":"禮貌留待回覆，收束自然。","dim":"Organization"},{"t":"Thank you for understanding, Mei","note":"正式且體貼的結尾。","dim":"Tone / Register"}],"delta":"升到 5 的關鍵：方案可更精準（指定展品、明確截止日）；語氣可更自信而非卑微；頂帶更簡潔有力、近零錯誤。"},{"score":5,"sectionBand":"≈6.0","label":"頂標","scores":{"Task Completion":5,"Tone / Register":5,"Organization":5,"Language Use":5},"sentences":[{"t":"Dear Professor Lin,","note":"得體。","dim":"Tone / Register"},{"t":"I'm writing to let you know that I won't be able to attend Friday's museum field trip, as I have a medical appointment I'm unable to move.","note":"bullet 1 完成，理由具體且不囉嗦。","dim":"Task Completion"},{"t":"I'm disappointed to miss it, since the Renaissance gallery is exactly what we've been studying.","note":"把缺席連結到課程內容＝顯示投入、語氣真誠。","dim":"Tone / Register"},{"t":"Could you tell me which exhibits and any in-class tasks I should focus on?","note":"bullet 2 完成且精準（exhibits + in-class tasks）。","dim":"Task Completion"},{"t":"To make up the work, I'd like to visit the same galleries on Saturday and submit a one-page response comparing two of the paintings by Monday.","note":"bullet 3 補救**極具體**（時間、產出、截止）＝超額完成，頂帶特徵。","dim":"Task Completion"},{"t":"Please let me know if that meets your expectations.","note":"自信而得體的請求收束。","dim":"Tone / Register"},{"t":"Thank you, Mei","note":"簡潔有力。","dim":"Language Use"}],"delta":"已達頂帶：三 bullet 全覆蓋、補救方案精準可執行、語氣自信得體、句構多樣、近零錯誤，並與課程連結顯示投入。"}]},{"id":"W-email-001","section":"writing","taskType":"write-email","format":"2026","topic":"Write an Email — Reply to a Group Presentation Invitation","author":"self-authored, original; aligned to 2026 'Write an Email' task","timeLimit":7,"wordRange":[80,120],"prompt":{"scenario":"A classmate, Sam, has emailed you inviting you to join a three-person group for a class presentation next week. Write a reply to Sam.","bullets":["Accept (or decline) the invitation","Mention one thing about your schedule the group should know","Suggest a specific time to meet and prepare"]},"rubric":{"scale":"0–5","dims":[{"k":"Task Completion","b5":"三個 bullet 全覆蓋且各有具體相關細節","b3":"三點大致覆蓋，但至少一點偏空泛或未真正完成（如沒給確切時間）"},{"k":"Tone / Register","b5":"語氣與半正式情境完全相符、得體自然","b3":"語氣大致可接受，但偶過於隨意或生硬公式化"},{"k":"Organization","b5":"開場→內文→結尾清楚，句間銜接自然","b3":"結構可辨識，但以簡單並列為主、偶有重複"},{"k":"Language Use","b5":"句構多樣、用詞精準、幾乎無妨礙理解的錯誤","b3":"以簡單句為主，用詞普通，偶有錯誤但不太妨礙理解"}]},"models":[{"score":3,"sectionBand":"≈5.0","label":"達標基準","scores":{"Task Completion":3,"Tone / Register":3,"Organization":3,"Language Use":3},"sentences":[{"t":"Hi Sam,","note":"半正式稱呼恰當，符合同學情境。","dim":"Tone / Register"},{"t":"Thanks for your email. Yes, I want to join your group for the presentation.","note":"完成 bullet 1（接受），清楚但偏公式、無熱忱或細節。","dim":"Task Completion"},{"t":"One thing is that I have a part-time job on Tuesday and Thursday afternoons, so I am not free then.","note":"完成 bullet 2，有具體日子，這句是全篇最強處。","dim":"Task Completion"},{"t":"Can we meet to prepare together? Maybe we can meet sometime this week in the library.","note":"bullet 3 只說『某天』而非確切時間＝未真正完成；且 meet 重複、稍鬆散。","dim":"Task Completion"},{"t":"I think it will be good. See you soon, Alex","note":"填充句空泛（good），結尾尚可。","dim":"Language Use"}],"delta":"升到 4 的關鍵：bullet 3 必須給**確切**時段（如『週三下午 4 點』）；多用連接詞讓句子不再各自獨立；把 good/busy 這類普通詞換精準一點。"},{"score":4,"sectionBand":"≈5.5","label":"良好","scores":{"Task Completion":4,"Tone / Register":4,"Organization":4,"Language Use":4},"sentences":[{"t":"Hi Sam,","note":"稱呼恰當。","dim":"Tone / Register"},{"t":"Thanks for thinking of me — I'd be happy to join your group for the presentation.","note":"接受同時帶出溫度（thinking of me），縮寫 I'd 自然得體。","dim":"Tone / Register"},{"t":"Just so you know, I work part-time on Tuesday and Thursday afternoons, so those slots won't work for me, but I'm free most other times.","note":"bullet 2 完整，並主動補『其他時間可』＝對小組有幫助；but 對比清楚。","dim":"Task Completion"},{"t":"Could we meet this Wednesday at 4 p.m. in the library study room to divide up the sections?","note":"bullet 3 給出**確切**時間、地點與目的＝完成度高。","dim":"Task Completion"},{"t":"That would give us a full week to prepare.","note":"補一句理由，顯示有規劃思維。","dim":"Organization"},{"t":"Looking forward to working together, Alex","note":"正向收尾，語氣一致。","dim":"Tone / Register"}],"delta":"升到 5 的關鍵：可再體貼一層（提備案時間、明確分工）；用詞已好，頂帶會有更自然的銜接、零妨礙錯誤，以及一點個人聲音而非標準模板。"},{"score":5,"sectionBand":"≈6.0","label":"頂標","scores":{"Task Completion":5,"Tone / Register":5,"Organization":5,"Language Use":5},"sentences":[{"t":"Hi Sam,","note":"恰當。","dim":"Tone / Register"},{"t":"Thanks for thinking of me — I'd love to join your group for next week's presentation.","note":"接受＋明確熱忱（'d love），破折號用得自然。","dim":"Task Completion"},{"t":"One thing to flag: I have a part-time job on Tuesday and Thursday afternoons, so I can't meet then, but any other afternoon works well for me.","note":"bullet 2 完整並主動提供可用時段；措辭精準（flag）、句構有層次。","dim":"Language Use"},{"t":"Could we meet this Wednesday at 4 p.m. in the library study room?","note":"bullet 3 確切時間、地點。","dim":"Task Completion"},{"t":"If that clashes for anyone, Friday morning would be my backup.","note":"主動提備案＝體貼且超額完成，正是頂帶特徵。","dim":"Task Completion"},{"t":"That way we can split the sections early and still leave time to rehearse together.","note":"收束說明目的，整封信前後連貫、顯示規劃。","dim":"Organization"},{"t":"Looking forward to it, Alex","note":"自然、有個人聲音的結尾。","dim":"Tone / Register"}],"delta":"已達頂帶：三個 bullet 全覆蓋且超額（備案時間）、語氣完全相符、句構多樣、近零錯誤、讀來像真人而非模板。"}]}],"speaking":[{"id":"S-interview-002","section":"speaking","taskType":"speak-interview","format":"2026","topic":"Take an Interview — Free Time & Hobbies","author":"self-authored, original; aligned to 2026 'Take an Interview' task","prepTime":0,"talkTime":45,"intro":"The interviewer will ask you four questions about how you spend your free time. There is no preparation time; answer each within about 45 seconds.","rubric":{"scale":"0–5","note":"發音/語調為口語表現，文字范文僅標『預期語調』，實際分數需錄音實測。","dims":[{"k":"Fluency & Pace","b5":"語速自然、停頓得當、少 filler","b3":"可說但偶卡頓或 filler 偏多"},{"k":"Development","b5":"具體例子＋反思，回答充分發展","b3":"有回應但籠統、缺具體例"},{"k":"Grammar & Vocabulary","b5":"句構多樣、用詞精準自然","b3":"簡單句為主、偶有文法小錯"},{"k":"Pronunciation & Intonation","b5":"清晰、語調有起伏（估計值）","b3":"大致可懂但語調偏平（估計值）"}]},"questions":[{"q":"Tell me about something you enjoy doing in your free time.","models":[{"score":3,"sectionBand":"≈5.0","label":"達標基準","scores":{"Fluency & Pace":3,"Development":3,"Grammar & Vocabulary":3,"Pronunciation & Intonation":3},"sentences":[{"t":"In my free time, I like cooking.","note":"直接但很短。","dim":"Development"},{"t":"I cook dinner almost every day.","note":"頻率資訊，仍簡單。","dim":"Development"},{"t":"It is fun and I can eat what I like.","note":"理由空泛、句子簡單。","dim":"Grammar & Vocabulary"}],"delta":"升 4：加具體（哪種料理）、用連接詞展開、說明為何享受。"},{"score":4,"sectionBand":"≈5.5","label":"良好","scores":{"Fluency & Pace":4,"Development":4,"Grammar & Vocabulary":4,"Pronunciation & Intonation":4},"sentences":[{"t":"In my free time I really enjoy cooking, especially trying recipes from other countries.","note":"具體面向（異國料理）。","dim":"Development"},{"t":"A few times a week I'll pick a new dish and just experiment.","note":"具體頻率＋做法。","dim":"Development"},{"t":"It's relaxing because it takes my mind off work.","note":"說明原因、用詞自然。","dim":"Grammar & Vocabulary"}],"delta":"升 5：更生動（旅行嘗過的菜）、加反思（完全忘記時間）。"},{"score":5,"sectionBand":"≈6.0","label":"頂標","scores":{"Fluency & Pace":5,"Development":5,"Grammar & Vocabulary":5,"Pronunciation & Intonation":5},"sentences":[{"t":"One thing I genuinely love is cooking — particularly recreating dishes I've tried while traveling.","note":"生動具體、口語自然。","dim":"Fluency & Pace"},{"t":"A couple of times a week I'll hunt down a recipe, tweak it to my taste, and cook it from scratch.","note":"三動作串接、用詞精準（hunt down / tweak / from scratch）。","dim":"Grammar & Vocabulary"},{"t":"It's the one activity where I completely lose track of time.","note":"反思＝深度。","dim":"Development"}],"delta":"已達頂帶：生動具體、句構流暢、用詞精準、有反思。"}]},{"q":"How did you first get into it?","models":[{"score":3,"sectionBand":"≈5.0","label":"達標基準","scores":{"Fluency & Pace":3,"Development":3,"Grammar & Vocabulary":3,"Pronunciation & Intonation":3},"sentences":[{"t":"I started cooking because my mother taught me when I was young.","note":"有來由但很概括。","dim":"Development"},{"t":"At first it was simple food.","note":"起點，仍簡短。","dim":"Development"},{"t":"But now I can make more things.","note":"對比但用詞普通。","dim":"Grammar & Vocabulary"}],"delta":"升 4：給一個具體契機、用時間連接詞鋪陳過程。"},{"score":4,"sectionBand":"≈5.5","label":"良好","scores":{"Fluency & Pace":4,"Development":4,"Grammar & Vocabulary":4,"Pronunciation & Intonation":4},"sentences":[{"t":"I got into it during the pandemic, honestly.","note":"具體契機、口語自然。","dim":"Fluency & Pace"},{"t":"I was stuck at home and bored, so I started watching cooking videos.","note":"因果鋪陳過程。","dim":"Development"},{"t":"It slowly turned into a real hobby.","note":"演變、句子清楚。","dim":"Grammar & Vocabulary"}],"delta":"升 5：更生動描述當時心境、用詞更有畫面。"},{"score":5,"sectionBand":"≈6.0","label":"頂標","scores":{"Fluency & Pace":5,"Development":5,"Grammar & Vocabulary":5,"Pronunciation & Intonation":5},"sentences":[{"t":"It actually started during the pandemic — I was stuck at home, bored out of my mind.","note":"生動口語（bored out of my mind）。","dim":"Grammar & Vocabulary"},{"t":"I began following cooking channels just to fill the time.","note":"具體行為＋動機。","dim":"Development"},{"t":"What started as boredom turned into something I now do for the pure enjoyment of it.","note":"前後對照的反思＝深度。","dim":"Development"}],"delta":"已達頂帶：具體契機、畫面感、前後對照的反思。"}]},{"q":"Do you prefer doing it alone or with others? Why?","models":[{"score":3,"sectionBand":"≈5.0","label":"達標基準","scores":{"Fluency & Pace":3,"Development":3,"Grammar & Vocabulary":3,"Pronunciation & Intonation":3},"sentences":[{"t":"I prefer to cook alone.","note":"明確但短。","dim":"Development"},{"t":"It is more quiet and I can focus.","note":"理由簡單。","dim":"Grammar & Vocabulary"},{"t":"But sometimes cooking with friends is also fun.","note":"兩面但未說明差別。","dim":"Development"}],"delta":"升 4：說明兩種情境的差別、用詞更精準。"},{"score":4,"sectionBand":"≈5.5","label":"良好","scores":{"Fluency & Pace":4,"Development":4,"Grammar & Vocabulary":4,"Pronunciation & Intonation":4},"sentences":[{"t":"Usually alone, because I find it relaxing and I can go at my own pace.","note":"立場＋理由清楚。","dim":"Development"},{"t":"That said, cooking with friends is fun on weekends.","note":"讓步連接（that said）。","dim":"Grammar & Vocabulary"},{"t":"It becomes more social than serious.","note":"點出差別。","dim":"Development"}],"delta":"升 5：對比更鮮明（meditative vs messier）、用詞更生動。"},{"score":5,"sectionBand":"≈6.0","label":"頂標","scores":{"Fluency & Pace":5,"Development":5,"Grammar & Vocabulary":5,"Pronunciation & Intonation":5},"sentences":[{"t":"Mostly alone, to be honest — it's almost meditative, and I can experiment without anyone waiting.","note":"精準形容（meditative）＋理由。","dim":"Grammar & Vocabulary"},{"t":"But now and then I'll cook with friends, and that's a totally different pleasure.","note":"對比鋪陳。","dim":"Development"},{"t":"Messier, louder, and more about the company than the food.","note":"三組對比收束＝鮮明畫面與反思。","dim":"Development"}],"delta":"已達頂帶：鮮明對比、精準用詞、收束有畫面。"}]},{"q":"Would you recommend it to other people? Why or why not?","models":[{"score":3,"sectionBand":"≈5.0","label":"達標基準","scores":{"Fluency & Pace":3,"Development":3,"Grammar & Vocabulary":3,"Pronunciation & Intonation":3},"sentences":[{"t":"Yes, I would recommend cooking to other people.","note":"明確但接下來偏條列。","dim":"Development"},{"t":"It is useful and you can save money.","note":"理由簡單。","dim":"Grammar & Vocabulary"},{"t":"Also it is healthy.","note":"再一個理由但很短。","dim":"Development"}],"delta":"升 4：把理由展開成句、加一個較獨特的好處。"},{"score":4,"sectionBand":"≈5.5","label":"良好","scores":{"Fluency & Pace":4,"Development":4,"Grammar & Vocabulary":4,"Pronunciation & Intonation":4},"sentences":[{"t":"Definitely.","note":"果斷、口語自然。","dim":"Fluency & Pace"},{"t":"Beyond the obvious — saving money and eating healthier — it's a creative outlet.","note":"超越顯而易見的理由。","dim":"Development"},{"t":"It doesn't need much equipment, so almost anyone can start.","note":"降低門檻的論證。","dim":"Grammar & Vocabulary"}],"delta":"升 5：強調獨特賣點（即時回饋）、語言更有說服力。"},{"score":5,"sectionBand":"≈6.0","label":"頂標","scores":{"Fluency & Pace":5,"Development":5,"Grammar & Vocabulary":5,"Pronunciation & Intonation":5},"sentences":[{"t":"Absolutely, and not just for the practical reasons like saving money or eating better.","note":"表態＋先擱置顯而易見的理由。","dim":"Development"},{"t":"What I'd really sell people on is that it's a low-cost creative outlet with an instant reward.","note":"精準賣點（instant reward）、句構有層次。","dim":"Grammar & Vocabulary"},{"t":"You make something with your hands and then you get to enjoy it — hard to beat that.","note":"畫面＋收束有力＝深度。","dim":"Development"}],"delta":"已達頂帶：突出獨特賣點、句構多樣、收束有力。"}]}]},{"id":"S-interview-001","section":"speaking","taskType":"speak-interview","format":"2026","topic":"Take an Interview — Smartphone Habits","author":"self-authored, original; aligned to 2026 'Take an Interview' task","prepTime":0,"talkTime":45,"intro":"The interviewer will ask you four questions about how you use your smartphone. There is no preparation time; answer each within about 45 seconds.","rubric":{"scale":"0–5","note":"發音/語調為口語表現，文字范文僅標『預期語調』，實際分數需錄音實測。","dims":[{"k":"Fluency & Pace","b5":"語速自然、停頓得當、少 filler","b3":"可說但偶卡頓或 filler 偏多"},{"k":"Development","b5":"具體例子＋反思，回答充分發展","b3":"有回應但籠統、缺具體例"},{"k":"Grammar & Vocabulary","b5":"句構多樣、用詞精準自然","b3":"簡單句為主、偶有文法小錯"},{"k":"Pronunciation & Intonation","b5":"清晰、語調有起伏（估計值）","b3":"大致可懂但語調偏平（估計值）"}]},"questions":[{"q":"Describe a situation when you used your smartphone for something important.","models":[{"score":3,"sectionBand":"≈5.0","label":"達標基準","scores":{"Fluency & Pace":3,"Development":3,"Grammar & Vocabulary":3,"Pronunciation & Intonation":3},"sentences":[{"t":"Um, one time my phone was very important for me.","note":"開頭有 filler（um）、句子簡單。","dim":"Fluency & Pace"},{"t":"I was lost in a new city, so I used the map to find my hotel.","note":"有情境但細節少。","dim":"Development"},{"t":"Without it, I think I cannot find the way.","note":"文法小錯（cannot → couldn't）。","dim":"Grammar & Vocabulary"}],"delta":"升 4：減少 filler、補具體細節（哪座城市、結果如何）、修條件句（couldn't）。"},{"score":4,"sectionBand":"≈5.5","label":"良好","scores":{"Fluency & Pace":4,"Development":4,"Grammar & Vocabulary":4,"Pronunciation & Intonation":4},"sentences":[{"t":"A couple of months ago, I was traveling alone in Tokyo and got completely lost at night.","note":"具體時間、地點、情境。","dim":"Development"},{"t":"I used my phone's map to find the right train, and it guided me back to my hostel in about twenty minutes.","note":"具體行動＋結果＋時間。","dim":"Development"},{"t":"Honestly, without it I would have been stuck, so that was a moment when my phone really mattered.","note":"條件句 would have＝較複雜結構且正確。","dim":"Grammar & Vocabulary"}],"delta":"升 5：語速更自然、加一層反思（important vs convenient）、用詞更生動。"},{"score":5,"sectionBand":"≈6.0","label":"頂標","scores":{"Fluency & Pace":5,"Development":5,"Grammar & Vocabulary":5,"Pronunciation & Intonation":5},"sentences":[{"t":"A couple of months ago I was traveling solo in Tokyo and got completely lost in a maze of back streets late at night.","note":"生動具體（maze of back streets）。","dim":"Development"},{"t":"I pulled up the map, figured out the nearest station, and it walked me right back to my hostel in about twenty minutes.","note":"三個動作流暢串接、用詞自然（pulled up / walked me back）。","dim":"Fluency & Pace"},{"t":"Without it I'd have been totally stranded — so that's the clearest example of my phone being genuinely important, not just convenient.","note":"反思區分 important vs convenient＝深度。","dim":"Development"}],"delta":"已達頂帶：具體生動、語速自然、用詞精準、有反思層次。"}]},{"q":"What's your general attitude toward your phone — do you feel it helps you or distracts you?","models":[{"score":3,"sectionBand":"≈5.0","label":"達標基準","scores":{"Fluency & Pace":3,"Development":3,"Grammar & Vocabulary":3,"Pronunciation & Intonation":3},"sentences":[{"t":"I think my phone helps me but sometimes it distracts me too.","note":"兩面並陳但無立場輕重。","dim":"Development"},{"t":"Like when I study, I check it too much.","note":"有一點例子但很短。","dim":"Development"},{"t":"But it also helps me to find information fast, so it is both good and bad.","note":"收在『都有』＝未選邊、用詞普通。","dim":"Grammar & Vocabulary"}],"delta":"升 4：取明確立場（哪邊多）、給具體做法當例子、連接更自然。"},{"score":4,"sectionBand":"≈5.5","label":"良好","scores":{"Fluency & Pace":4,"Development":4,"Grammar & Vocabulary":4,"Pronunciation & Intonation":4},"sentences":[{"t":"Overall I'd say it helps more than it distracts, but I have to manage it.","note":"明確立場＋條件，成熟。","dim":"Development"},{"t":"When I'm studying, I put it in another room, otherwise I keep checking messages.","note":"具體做法當例子。","dim":"Development"},{"t":"But for quick research or staying in touch with family abroad, it's honestly essential.","note":"用詞精準（essential）、結構清楚。","dim":"Grammar & Vocabulary"}],"delta":"升 5：加一層洞察（問題不在手機而在使用方式）、語調更自然。"},{"score":5,"sectionBand":"≈6.0","label":"頂標","scores":{"Fluency & Pace":5,"Development":5,"Grammar & Vocabulary":5,"Pronunciation & Intonation":5},"sentences":[{"t":"Honestly it's a bit of a love-hate thing for me.","note":"自然口語起手、語調有戲。","dim":"Fluency & Pace"},{"t":"It clearly helps — quick research, staying in touch with family overseas — but the distraction is real, so I've started leaving it in another room when I study.","note":"兩面＋具體做法，句構有層次。","dim":"Grammar & Vocabulary"},{"t":"That one habit doubled my focus, which tells me the problem isn't the phone itself, it's how I use it.","note":"洞察＋因果反思＝深度。","dim":"Development"}],"delta":"已達頂帶：立場清楚、具體做法、洞察使用方式、語言自然多樣。"}]},{"q":"Do you think smartphones have improved life overall?","models":[{"score":3,"sectionBand":"≈5.0","label":"達標基準","scores":{"Fluency & Pace":3,"Development":3,"Grammar & Vocabulary":3,"Pronunciation & Intonation":3},"sentences":[{"t":"Yes, I think smartphones improved our life.","note":"立場有，但時態小瑕（improved → have improved）。","dim":"Grammar & Vocabulary"},{"t":"We can talk to people far away and find information easily.","note":"兩個理由但籠統。","dim":"Development"},{"t":"But some people use too much, so overall I think it is good for most people.","note":"承認反面但收束空泛。","dim":"Development"}],"delta":"升 4：理由更具體（哪方面改善）、加 trade-off 語感、修時態。"},{"score":4,"sectionBand":"≈5.5","label":"良好","scores":{"Fluency & Pace":4,"Development":4,"Grammar & Vocabulary":4,"Pronunciation & Intonation":4},"sentences":[{"t":"On the whole, yes.","note":"明確表態、口語自然。","dim":"Fluency & Pace"},{"t":"They've made communication and information almost instant, which is a huge benefit.","note":"理由具體＋關係子句。","dim":"Grammar & Vocabulary"},{"t":"There are downsides like screen addiction, but the convenience outweighs them for most people, as long as we're careful.","note":"讓步＋條件，論點有發展。","dim":"Development"}],"delta":"升 5：點出代價（注意力/隱私）並論證可管理、用詞更精準。"},{"score":5,"sectionBand":"≈6.0","label":"頂標","scores":{"Fluency & Pace":5,"Development":5,"Grammar & Vocabulary":5,"Pronunciation & Intonation":5},"sentences":[{"t":"On balance, yes — though it's a trade-off.","note":"立場＋框架（trade-off），精煉。","dim":"Development"},{"t":"They've made information and communication almost instant, which has genuinely improved things like education and access to services.","note":"具體領域＋精準用詞。","dim":"Grammar & Vocabulary"},{"t":"The cost is our attention and privacy, but I'd argue those are problems we can manage, whereas the benefits are hard to give up once you've had them.","note":"對比 whereas＋論證＝深度與多樣句構。","dim":"Development"}],"delta":"已達頂帶：框架清楚、具體領域、權衡論證、句構多樣。"}]},{"q":"Should schools encourage healthier phone habits among students?","models":[{"score":3,"sectionBand":"≈5.0","label":"達標基準","scores":{"Fluency & Pace":3,"Development":3,"Grammar & Vocabulary":3,"Pronunciation & Intonation":3},"sentences":[{"t":"Yes, schools should help students use phones in a healthy way.","note":"立場清楚但偏空泛。","dim":"Development"},{"t":"Maybe they can teach students to not use phone in class.","note":"有做法但文法小錯（the phone）。","dim":"Grammar & Vocabulary"},{"t":"It is important because students use phone too much now.","note":"理由籠統、重複。","dim":"Development"}],"delta":"升 4：提具體做法（關通知）、區分『禁』vs『教』、修冠詞。"},{"score":4,"sectionBand":"≈5.5","label":"良好","scores":{"Fluency & Pace":4,"Development":4,"Grammar & Vocabulary":4,"Pronunciation & Intonation":4},"sentences":[{"t":"Definitely.","note":"果斷表態、口語自然。","dim":"Fluency & Pace"},{"t":"Schools could teach simple habits, like turning off notifications during study time, rather than just banning phones.","note":"具體做法＋對比『禁』。","dim":"Development"},{"t":"Banning often doesn't work, but teaching self-control is a skill they'll use for life.","note":"論證＋精準用詞（self-control）。","dim":"Grammar & Vocabulary"}],"delta":"升 5：用更精準概念（digital self-regulation）、說明習慣可遷移。"},{"score":5,"sectionBand":"≈6.0","label":"頂標","scores":{"Fluency & Pace":5,"Development":5,"Grammar & Vocabulary":5,"Pronunciation & Intonation":5},"sentences":[{"t":"Yes, but the approach matters.","note":"表態＋帶出論點角度。","dim":"Development"},{"t":"Instead of outright bans, which students just work around, schools should teach digital self-regulation — things like notification management and scheduled breaks.","note":"精準概念＋具體做法、句構複雜正確。","dim":"Grammar & Vocabulary"},{"t":"That treats the phone as a tool to master rather than a temptation to forbid, and those habits transfer well beyond school.","note":"重新框架＋遷移論證＝深度。","dim":"Development"}],"delta":"已達頂帶：角度清楚、精準概念、重新框架、論證可遷移。"}]}]},{"id":"S-listenrepeat-001","section":"speaking","taskType":"listen-repeat","format":"2026","topic":"Listen and Repeat — Campus Announcements","author":"self-authored, original; aligned to 2026 'Listen and Repeat' task","rubric":{"scale":"0–5","dims":[{"k":"Exactness","b5":"完整且精確複誦，意義不變","b3":"保留主要意義但有遺漏或替換"},{"k":"Intelligibility","b5":"清晰可懂、節奏自然","b3":"大致可懂但有停頓或失真"}]},"technique":"聽一遍就要複誦：① 抓『意義組塊』不要逐字記 ② 句末語調照原句（直述句下降、問句上升）③ 寧可流暢近似，不要逐字卡頓 ④ 連音與弱化照原速。","items":[{"sentence":"The library closes at nine on weekdays.","tip":"連音 closes-at；重音落在 nine 與 week-days。"},{"sentence":"Please remember to bring your student ID to the exam.","tip":"連音 bring-your；ID 重音在後（I-D）。"},{"sentence":"The lecture has been moved to the third-floor seminar room.","tip":"has been 弱化；third-floor 連讀、room 句末微降。"},{"sentence":"Most of the reading is available online through the library portal.","tip":"of-the 弱化成 /əvðə/；portal /ˈpɔːr.tl̩/。"},{"sentence":"Students who registered early will receive a confirmation email.","tip":"registered 三音節 /ˈre.dʒɪ.stəd/；confirmation 重音在 -ma-。"},{"sentence":"The deadline for submitting your research proposal is next Friday.","tip":"連音 deadline-for；proposal 重音在中間 -po-；句末 Friday 微降。"},{"sentence":"Attendance is mandatory unless you have written permission from the instructor.","tip":"mandatory 重音首音節；permission 重音中間；句子長，先抓三組塊。"}]}],"vocab":[{"id":"V-awl-s1","section":"vocab","taskType":"vocab","sublist":1,"depth":"deep","title":"AWL Sublist 1 — 最高頻學術詞","author":"Academic Word List (Coxhead) 字頭；釋義/例句/搭配自製。","words":[{"w":"analyze","pos":"v.","zh":"分析","en":"examine in detail","ex":"Researchers analyze the data to identify patterns.","fam":["analysis (n.)","analytical (adj.)","analyst (n.)"],"col":["analyze data","analyze the results"]},{"w":"approach","pos":"n./v.","zh":"方法；接近","en":"a way of dealing with something","ex":"The study takes a quantitative approach to the problem.","fam":["approachable (adj.)"],"col":["a new approach","approach a problem"]},{"w":"area","pos":"n.","zh":"領域 const $=s=>document.querySelector(s);
function daysSince(d){return Math.floor((Date.now()-new Date(d+'T00:00:00').getTime())/86400000);}
function curWeek(){return Math.min(8,Math.max(1,Math.floor(daysSince(PLAN_START)/7)+1));}
function overall(){const v=SECTIONS.map(([k])=>S.scores[k]).filter(x=>x!=null);if(v.length<4)return null;return Math.round(v.reduce((a,b)=>a+b,0)/4*2)/2;}
/* ===== 官方校準（poor man's equating）：原始估計存 S.scores，校準只在顯示層套用 ===== */
function clampB(b){if(b==null)return null;return Math.round(Math.max(1,Math.min(6,b))*2)/2;}
function calMap(sec,raw){const pts=(S.cal&&S.cal[sec])||[];
  if(raw==null)return {band:null,conf:pts.length};
  if(!pts.length)return {band:clampB(raw),conf:0};
  if(pts.length<3){const off=pts.reduce((s,p)=>s+(p.official-p.app),0)/pts.length;return {band:clampB(raw+off),conf:pts.length};}
  const n=pts.length,sx=pts.reduce((s,p)=>s+p.app,0),sy=pts.reduce((s,p)=>s+p.official,0),sxx=pts.reduce((s,p)=>s+p.app*p.app,0),sxy=pts.reduce((s,p)=>s+p.app*p.official,0),den=n*sxx-sx*sx;
  if(Math.abs(den)<1e-9){const off=(sy-sx)/n;return {band:clampB(raw+off),conf:n};}
  const a=(n*sxy-sx*sy)/den,b=(sy-a*sx)/n;return {band:clampB(a*raw+b),conf:n};}
function calBand(sec){return calMap(sec,S.scores[sec]).band;}
function calConf(sec){return ((S.cal&&S.cal[sec])||[]).length;}
function overallCal(){const v=SECTIONS.map(([k])=>calBand(k)).filter(x=>x!=null);if(v.length<4)return null;return Math.round(v.reduce((a,b)=>a+b,0)/4*2)/2;}
function anyCal(){return SECTIONS.some(([k])=>calConf(k)>0);}
function calPill(sec){const c=calConf(sec);return c?`<span class="pill ok small" title="已用 ${c} 次官方對照校準">校準×${c}</span>`:`<span class="pill gap small" title="未經官方校準，為估計值">估計</span>`;}
function rateToBand(p){if(p>=0.95)return 6;if(p>=0.85)return 5.5;if(p>=0.72)return 5;if(p>=0.58)return 4.5;if(p>=0.45)return 4;if(p>=0.32)return 3.5;if(p>=0.2)return 3;return 2.5;}
function chkToBand(c,t){const p=c/t;if(p>=1)return 6;if(p>=0.85)return 5.5;if(p>=0.7)return 5;if(p>=0.5)return 4.5;if(p>=0.34)return 4;if(p>0)return 3.5;return 3;}
function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
function esc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

async function loadContent(){
  if(typeof window!=='undefined'&&window.__EMBED__){
    CONTENT.reading=window.__EMBED__.reading||[];
    CONTENT.listening=window.__EMBED__.listening||[];
    CONTENT.writing=window.__EMBED__.writing||[];
    CONTENT.speaking=window.__EMBED__.speaking||[];
    CONTENT.vocab=window.__EMBED__.vocab||[];
    CONTENT.resources=window.__EMBED__.resources||{resources:[]};
    return;
  }
  try{
    const mf=await (await fetch('content/manifest.json')).json();
    const load=async e=>{const o=await (await fetch('content/'+e.file)).json();o._meta=e;return o;};
    CONTENT.reading=await Promise.all((mf.reading||[]).map(load));
    CONTENT.listening=await Promise.all((mf.listening||[]).map(load));
    CONTENT.writing=await Promise.all((mf.writing||[]).map(load));
    CONTENT.speaking=await Promise.all((mf.speaking||[]).map(load));
    CONTENT.vocab=await Promise.all((mf.vocab||[]).map(load));
    try{CONTENT.resources=await (await fetch('content/resources.json')).json();}catch(e){CONTENT.resources={resources:[]};}
  }catch(e){
    CONTENT.reading=[FALLBACK_READING];CONTENT.listening=[];CONTENT.writing=FALLBACK_WRITING;CONTENT.speaking=FALLBACK_SPEAKING;CONTENT.vocab=FALLBACK_VOCAB;CONTENT.resources={resources:[]};CONTENT.error=e.message;
  }
}

    return {kind:'single',stem:q.stem,choices:keys.map(k=>`[${k}] ${q.positions[k]}`),correct:keys.indexOf(q.answer),type:q.type};
  }
  if(q.multiSelect||Array.isArray(q.answer)){
    return {kind:'multi',stem:(q.intro?('（引言）'+q.intro+'　'):'')+q.stem,choices:q.options,correct:q.answer.slice().sort(),type:q.type,need:q.answer.length};
  }
  return {kind:'single',stem:q.stem,choices:q.options,correct:q.answer,type:q.type,highlight:q.highlight};
}
function startQuiz(set,opts){
  Q={set,i:0,ans:[],mode:opts.mode||'practice',onDone:opts.onDone,secs:0,timed:!!opts.timed,notes:'',audio:!!set.script};
  if(Q.timed){clearInterval(qTimer);qTimer=setInterval(()=>{Q.secs++;const e=$('#qtime');if(e)e.textContent=fmt(Q.secs);},1000);}
  renderQ();
}
function renderQ(){
  const set=Q.set,raw=set.questions[Q.i],q=normalizeQ(raw),picked=Q.ans[Q.i];
  const answered=picked!=null;
  const reveal=Q.mode==='practice'&&answered;
  let media='';
  if(Q.audio){
    media=`<div class="card" style="background:var(--card2);margin:0 0 10px">
      <div class="flex-between"><b class="small">🎧 ${esc(set.type||'聽力')}</b>
        <span><label class="small mut">速度 <select onchange="ttsRate(this.value)">
          <option value="0.8">0.8x</option><option value="1" selected>1.0x</option><option value="1.25">1.25x</option><option value="1.5">1.5x</option></select></label></span></div>
      <div class="row" style="margin-top:8px"><button class="acc" id="ttsBtn" onclick="ttsToggle()">▶ 播放</button><button class="ghost" onclick="ttsReplay()">↻ 重播</button></div>
      <textarea rows="3" placeholder="筆記（只記結構詞/態度/例子標記）…" style="margin-top:8px" oninput="Q.notes=this.value">${esc(Q.notes)}</textarea>
      <p class="small mut" style="margin:6px 0 0">真考聽力只能聽一次；練習可重播，但建議先逼自己聽一遍再作答。</p></div>`;
  }else{
    media=`<details ${Q.i===0?'open':''} style="margin:0 0 10px"><summary class="small mut">展開短文</summary><div class="passage" style="margin-top:8px">${set.passage.split('\n').map(p=>esc(p)).join('<br><br>')}</div></details>`;
  }
  const choices=q.choices.map((o,j)=>{
    let cls='opt';
    if(q.kind==='multi'){if(reveal){if(q.correct.includes(j))cls+=' right';else if((picked||[]).includes(j))cls+=' wrong';}else if((picked||[]).includes(j))cls+=' sel';
      return `<button class="${cls}" onclick="toggleMulti(${j})">${String.fromCharCode(65+j)}. ${esc(o)}</button>`;}
    if(reveal){if(j===q.correct)cls+=' right';else if(j===picked)cls+=' wrong';}else if(picked===j)cls+=' sel';
    return `<button class="${cls}" onclick="pickQ(${j})">${String.fromCharCode(65+j)}. ${esc(o)}</button>`;
  }).join('');
  const meta=set._meta||{};
  const canNext = q.kind==='multi' ? (Q.mode!=='practice'? (picked&&picked.length>0) : answered) : (Q.mode!=='practice'? picked!=null : answered);
  $('#view').innerHTML=`
   <div class="card">
     <div class="flex-between"><span class="tag">${esc(raw.type||'題')}</span>
       <span class="small mut">${esc(meta.topic||set.topic||'')} ${meta.cefr?'· <span class="pill '+(meta.cefr==='C2'?'c2':'c1')+' small">'+meta.cefr+'</span>':''} · 第 ${Q.i+1}/${set.questions.length} 題 ${Q.timed?'· <span class="timer" id="qtime">'+fmt(Q.secs)+'</span>':''}</span></div>
     ${media}
     ${q.highlight?`<div class="passage" style="max-height:none;margin-bottom:8px"><span class="mut small">highlight：</span>${esc(q.highlight)}</div>`:''}
     <p style="font-weight:600">${esc(q.stem)}</p>
     ${q.kind==='multi'?'<p class="small mut">複選——選 '+q.need+' 項。</p>':''}
     ${choices}
     ${q.kind==='multi'&&!reveal&&Q.mode==='practice'?'<button class="acc" style="margin-top:8px" onclick="submitMulti()" '+((picked&&picked.length===q.need)?'':'disabled')+'>送出</button>':''}
     <div class="row" style="margin-top:10px">
       ${Q.i>0?'<button class="ghost" onclick="navQ(-1)">上一題</button>':''}
       ${canNext?(Q.i<set.questions.length-1?'<button class="acc" onclick="navQ(1)">下一題</button>':'<button class="acc" onclick="finishQuiz()">完成</button>'):''}
     </div>
   </div>`;
}
function pickQ(j){const raw=Q.set.questions[Q.i];if(Q.mode==='practice'&&Q.ans[Q.i]!=null)return;Q.ans[Q.i]=j;renderQ();}
function toggleMulti(j){const cur=Q.ans[Q.i]||[];if(Q.mode==='practice'&&Array.isArray(cur)&&cur._locked)return;const i=cur.indexOf(j);if(i>=0)cur.splice(i,1);else cur.push(j);Q.ans[Q.i]=cur;renderQ();}
function submitMulti(){const cur=Q.ans[Q.i]||[];cur._locked=true;Q.ans[Q.i]=cur;renderQ();}
function navQ(d){if(d>0&&Q.mode==='practice'){/*ok*/}Q.i+=d;renderQ();}
function quizScore(){let correct=0;const total=Q.set.questions.length;
  Q.set.questions.forEach((raw,i)=>{const q=normalizeQ(raw),a=Q.ans[i];
    if(q.kind==='multi'){const got=(a||[]).slice().sort();if(got.length===q.correct.length&&got.every((x,k)=>x===q.correct[k]))correct++;}
    else if(a===q.correct)correct++;});
  return {correct,total,band:rateToBand(correct/total)};}
function finishQuiz(){clearInterval(qTimer);const r=quizScore();if(Q.onDone)Q.onDone(r);}

function rubScore(ns){const boxes=document.querySelectorAll('#view details input[type=checkbox]');const c=[...boxes].filter(b=>b.checked).length,band=chkToBand(c,boxes.length);
  const key=ns==='sp'?'speaking':'writing';$('#'+ns+'Band').innerHTML=`勾 ${c}/${boxes.length} → 估 <b>${band}</b> 分　<button class="ghost small" onclick="S.scores.${key}=${band};save();alert('已更新${ns==='sp'?'口說':'寫作'} = ${band}')">套用總覽</button>`;}
function spBegin(prep,talk){$('#spStart').disabled=true;$('#spStop').disabled=false;
  let phase=prep>0?'prep':'talk',left=prep>0?prep:talk;
  if(phase==='talk'){$('#spPhase').textContent='錄音中 ●';startRec();}else{$('#spPhase').textContent='構思中…';}

  tick();clearInterval(spTimer);spTimer=setInterval(tick,1000);}

  mediaRec.start();}catch(e){const el=$('#spAudio');if(el)el.innerHTML='<p class="small bad">無法錄音：'+esc(e.message)+'（請允許麥克風）</p>';}}
function spStop(){clearInterval(spTimer);const p=$('#spPhase');if(p)p.textContent='完成';const a=$('#spStart'),b=$('#spStop');if(a)a.disabled=false;if(b)b.disabled=true;if(mediaRec&&mediaRec.state!=='inactive')mediaRec.stop();}

/* ===== Build a Sentence 句構精熟 drill（點選排序 + 逐題教學 + 構念診斷）===== */
let bs=null;
function bsShuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  if(a.length>1&&a.join('|')===bs?._orig)return bsShuffle(a);return a;}
function startBuild(id){const set=wBuildList().find(s=>s.id===id)||wBuildList()[0];if(!set)return;bs={set,i:0,correct:0,results:[],built:[],bank:[],checked:false,ok:false};bsLoad();}
function bsLoad(){const it=bs.set.items[bs.i];bs._orig=it.answer.join('|');bs.built=[];bs.bank=bsShuffle(it.answer);bs.checked=false;bs.ok=false;renderBuild();}
function bsPick(j){if(bs.checked)return;bs.built.push(bs.bank.splice(j,1)[0]);renderBuild();}
function bsUnpick(j){if(bs.checked)return;bs.bank.push(bs.built.splice(j,1)[0]);renderBuild();}
function bsReset(){if(bs.checked)return;bs.bank=bsShuffle(bs.bank.concat(bs.built));bs.built=[];renderBuild();}
function bsCheck(){const it=bs.set.items[bs.i];const cand=bs.built,eq=a=>a.length===cand.length&&a.every((x,k)=>x===cand[k]);
  bs.ok=eq(it.answer)||(it.acceptAlt||[]).some(eq);bs.checked=true;if(bs.ok)bs.correct++;bs.results.push({focus:it.focus,ok:bs.ok});save();renderBuild();}
function bsNext(){bs.i++;if(bs.i>=bs.set.items.length){bsDone();return;}bsLoad();}
function renderBuild(){
  const it=bs.set.items[bs.i],n=bs.set.items.length;
  const built=bs.built.map((c,j)=>`<button class="opt sel" style="width:auto;display:inline-block;margin:3px 4px;padding:7px 10px" ${bs.checked?'disabled':''} onclick="bsUnpick(${j})">${esc(c)}</button>`).join('')||'<span class="small mut">點下方詞塊，依序組成一個句子…</span>';
  const bank=bs.bank.map((c,j)=>`<button class="opt" style="width:auto;display:inline-block;margin:3px 4px;padding:7px 10px" ${bs.checked?'disabled':''} onclick="bsPick(${j})">${esc(c)}</button>`).join('')||'<span class="small mut">（全部已用）</span>';
  let foot='';
  if(!bs.checked){foot=`<div class="row" style="margin-top:12px"><button class="acc" ${bs.bank.length===0?'':'disabled'} onclick="bsCheck()">檢查</button><button class="ghost" onclick="bsReset()">清空</button></div>`;}
  else{foot=`<div class="card" style="background:${bs.ok?'#10301f':'#311414'};border-color:${bs.ok?'#1c5e46':'#5a2a2a'};margin:12px 0 0">
      <b>${bs.ok?'✅ 正確':'❌ 再看一次'}</b>
      <p style="margin:8px 0 4px"><b>${esc(it.sentence)}</b></p>
      <p class="small mut" style="margin:4px 0">▸ 規則：${esc(it.why)}</p>
      <p class="small bad" style="margin:4px 0">⚠ 常見錯排：${esc(it.trap)}</p></div>
    <button class="acc" style="margin-top:10px" onclick="bsNext()">${bs.i<n-1?'下一題':'看結果'}</button>`;}
  $('#view').innerHTML=`<div class="card">
    <div class="flex-between"><h2 style="margin:0">🧩 Build a Sentence</h2><button class="ghost small" onclick="go('write')">← 回寫作</button></div>
    <div class="flex-between"><span class="small mut">${esc(bs.set.topic.split('—').pop().trim())} · 第 ${bs.i+1}/${n} 題</span><span class="tag">句構：${esc(it.focus)}</span></div>
    <p class="small mut" style="margin:8px 0 2px">情境：${esc(it.scenario)}</p>
    <div class="passage" style="max-height:none;min-height:48px;margin:6px 0">${built}</div>
    <p class="small mut" style="margin:8px 0 2px">可用詞塊：</p>
    <div>${bank}</div>
    ${foot}
  </div>`;
}
function bsDone(){
  const total=bs.set.items.length,band=rateToBand(bs.correct/total);
  S.log.push({t:Date.now(),type:'build-sentence',correct:bs.correct,total,band});save();
  const weak=[...new Set(bs.results.filter(r=>!r.ok).map(r=>r.focus))];
  $('#view').innerHTML=`<div class="card"><h2>🧩 句構結算</h2>
    <p>答對 <b>${bs.correct}/${total}</b> · 估計 <b>${band}</b> 分</p>
    ${weak.length?`<div class="card" style="background:#2a2410;border-color:#5e4d1c;margin:10px 0">
      <b class="small">⬆ 還不穩的句構（5.5+ 的關鍵破口，建議重練）</b>
      <ul style="margin:6px 0 0;padding-left:20px">${weak.map(w=>`<li class="small">${esc(w)}</li>`).join('')}</ul></div>`
      :'<p class="small good" style="margin:10px 0">全數正確——這些句構已能自動化，繼續保持並用進你的作文/口說。</p>'}
    <p class="small mut">誠實提醒：句構精熟是 5.5+ 的<b>必要</b>條件，但分數仍取決於整體練習與官方錨定；把這些句型實際用進 Email／Discussion／面談才會轉成分數。</p>
    <button class="acc" onclick="startBuild('${esc(bs.set.id)}')">再做一次</button> <button class="ghost" onclick="go('write')">回寫作</button></div>`;
}

/* ============ 模考 R→L→W→S ============ */
let mock=null;
function MockIntro(){
  $('#view').innerHTML=`<div class="card"><h2>📝 全真模考</h2>
    <p class="small mut">依新制順序 閱讀 → 聽力 → 寫作 → 口說，各一節，最後輸出四科 1–6 與總分並存入紀錄。閱讀/聽力為 collect 模式（不即時對答案）。</p>
    <p class="small mut">提醒：自製題堆量練手感，真正分數請以官方錨定為準（題源中心）。</p>
    <button class="acc" ${CONTENT.reading.length&&CONTENT.listening.length?'':'disabled'} onclick="mockStart()">開始模考</button>
    ${(!CONTENT.reading.length||!CONTENT.listening.length)?'<p class="small bad">需載入閱讀與聽力題庫（本機 server / 部署）。</p>':''}</div>`;
}
function mockStart(){mock={res:{},t:Date.now()};mockNext('reading');}
function mockNext(stage){
  if(stage==='reading'){startQuiz(CONTENT.reading[0],{mode:'collect',timed:true,onDone:r=>{mock.res.reading=r.band;mockNext('listening');}});return;}
  if(stage==='listening'){startQuiz(CONTENT.listening[0],{mode:'collect',timed:true,onDone:r=>{if(ttsAvail())speechSynthesis.cancel();mock.res.listening=r.band;mockNext('writing');}});return;}
  if(stage==='writing'){mockWrite();return;}
  if(stage==='speaking'){mockSpeak();return;}
  if(stage==='result'){mockResult();return;}
}
function mockWrite(){const p=wList()[0];const dims=((p.rubric||{}).dims)||[];
  $('#view').innerHTML=`<div class="card"><h2>模考 · 寫作</h2><p class="small mut">${esc(TASK_LABEL[p.taskType]||p.taskType)} · ${p.timeLimit} 分 · ${(p.wordRange||[]).join('–')} 字</p>
    <div class="passage" style="max-height:30vh">${promptHtml(p)}</div>
    <textarea id="wText" rows="7" placeholder="作答…" style="margin-top:8px"></textarea>
    <details style="margin-top:10px" open><summary>寫完後自評</summary>${rubric(dims.map(d=>d.k),'w')}</details>
    <button class="acc" style="margin-top:10px" onclick="mockGrade('writing')">完成此科 → 口說</button></div>`;
}
function mockSpeak(){const set=spList().find(s=>s.taskType==='speak-interview')||spList()[0];const qd=(set.questions||[{q:set.topic}])[0];const talk=set.talkTime||45;
  $('#view').innerHTML=`<div class="card"><h2>模考 · 口說</h2><p class="small mut">${esc(SP_LABEL[set.taskType]||set.taskType)} · 無準備 · ${talk}s</p>
    <p style="font-weight:600">${esc(qd.q)}</p>
    <div class="row" style="margin:10px 0"><button class="acc" id="spStart" onclick="spBegin(${set.prepTime||0},${talk})">開始錄音</button><button class="ghost" id="spStop" onclick="spStop()" disabled>停止</button></div>
    <span class="timer" id="spTimer"></span> <span class="small mut" id="spPhase"></span><div id="spAudio"></div>
    <details style="margin-top:10px" open><summary>錄完後自評</summary>${rubric(((set.rubric||{}).dims||[]).map(d=>d.k),'sp')}</details>
    <button class="acc" style="margin-top:10px" onclick="mockGrade('speaking')">完成此科 → 結算</button></div>`;
}
function mockGrade(section){const boxes=document.querySelectorAll('#view details input[type=checkbox]');const c=[...boxes].filter(b=>b.checked).length;mock.res[section]=chkToBand(c,boxes.length);
  if(section==='writing')mockNext('speaking');else mockNext('result');}
function mockResult(){const r=mock.res,avg=Math.round((r.reading+r.listening+r.speaking+r.writing)/4*2)/2;
  S.scores={reading:r.reading,listening:r.listening,speaking:r.speaking,writing:r.writing};
  S.history.push({t:Date.now(),type:'mock',res:r,overall:avg});save();
  $('#view').innerHTML=`<div class="card"><h2>模考結算 ✅</h2><div class="big">${avg} <span class="mut small">/ 6.0</span></div>
    <div class="scoregrid" style="margin:10px 0">${SECTIONS.map(([k,n])=>`<div class="s"><small>${n}</small><b>${r[k]}</b></div>`).join('')}</div>
    <p class="small mut">${avg>=TARGET?'達標！維持穩定度。':'距 5.5 差 '+(TARGET-avg).toFixed(1)+'，補最弱科。'}已存入模考紀錄並更新總覽。</p>
    <p class="small mut">${anyCal()?'（分數已套用官方校準）':'⚠ 此為<b>估計值</b>，未經官方校準。做一份官方模考後到「🎯 官方校準」輸入真實分即可對齊。'}</p>
    <button class="acc" onclick="go('dash')">回總覽</button> <button class="ghost" onclick="go('calib')">🎯 官方校準</button></div>`;
}

/* ============ 啟動 ============ */
function boot(){loadContent().then(()=>{render();});}
if(typeof document!=='undefined'&&document.getElementById('view'))boot();
if(typeof navigator!=='undefined'&&'serviceWorker'in navigator&&typeof location!=='undefined'&&location.protocol.indexOf('http')===0){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
